slots:
  brand:
    type: text
    mappings:
      - type: from_llm

  service_type:
    type: text
    mappings:
      - type: custom

  user_name:
    type: text
    mappings:
      - type: from_llm

  user_phone:
    type: text
    mappings:
      - type: from_llm

  user_message:
    type: text
    mappings:
      - type: from_llm

  location:
    type: text
    mappings:
      - type: custom

  area_size:
    type: text
    mappings:
      - type: from_llm

  order_id:
    type: text
    mappings:
      - type: from_llm

  problem_type:
    type: text
    mappings:
      - type: from_llm

  subscription_type:
    type: text
    mappings:
      - type: from_llm

  confirm_human_handoff:
    type: categorical
    values:
      - "Yes"
      - "No"
    mappings:
      - type: from_llm

  branch_name:
    type: text
    mappings:
      - type: custom

  is_available:
    type: bool
    mappings:
      - type: custom

  queue_position:
    type: float
    mappings:
      - type: custom

  rating:
    type: float
    mappings:
      - type: custom

  search_found:
    type: bool
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: |
        أهلاً وسهلاً بيك 👋
        أنا عزبوت، مساعد مجموعة العزب.

        أقدر أساعدك في:
        🔧 طلب صيانة من UberFix
        🏗️ مقاولات وتجهيز مشروعات
        ✨ تشطيبات فاخرة
        🎨 هوية تجارية وتجهيز مساحات
        📦 توريدات وخامات

        قولّي تحب نبدأ بإيه؟

  utter_goodbye:
    - text: |
        شكرًا لتواصلك مع مجموعة العزب 🤝
        سعداء بخدمتك دائمًا، وأي وقت تحتاجنا هتلاقينا معاك خطوة بخطوة.

  utter_thanks:
    - text: |
        تحت أمرك في أي وقت 🤍
        وجودك يهمنا، وأنا جاهز أساعدك خطوة بخطوة.

  utter_bot_challenge:
    - text: |
        أنا عزبوت، مساعد مجموعة العزب الذكي 🤖
        أقدر أساعدك في الصيانة، التشطيبات، الهوية التجارية، التوريدات، أو أوصلك بالفريق المناسب.

  utter_out_of_scope:
    - text: |
        الطلب ده خارج نطاق خدماتي الحالية.
        لكن أقدر أساعدك في المقاولات، التشطيبات، الهوية التجارية، الصيانة، أو التوريدات.

        تحب نبدأ بأي خدمة منهم؟

  utter_ask_confirm_human_handoff:
    - text: |
        تحب أوصلك بأحد أفراد الفريق مباشرة؟
    - text: |
        أقدر أحوّلك لممثل من الفريق لو محتاج متابعة بشرية مباشرة.
      buttons:
        - title: "✅ نعم"
          payload: '/SetSlots(confirm_human_handoff="Yes")'
        - title: "❌ لا"
          payload: '/SetSlots(confirm_human_handoff="No")'

  utter_lead_submitted:
    - text: |
        ✅ تم استلام بياناتك بنجاح.

        فريق مجموعة العزب هيراجع الطلب ويتواصل معك في أقرب وقت مناسب.
        شكرًا لثقتك فينا 🤝

  utter_transfer_to_manager:
    - text: |
        👤 جاري تحويلك لأحد ممثلي الفريق.

        ملخص المحادثة:
        {summary}

        سيتواصل معك الفريق قريبًا.

  utter_ask_user_name:
    - text: |
        تمام، نبدأ تسجيل الطلب بشكل صحيح.
        ممكن أعرف اسم حضرتك؟

  utter_ask_user_phone:
    - text: |
        ممتاز يا {user_name}.
        ممكن رقم التواصل؟ فريق التشغيل هيستخدمه لمتابعة الطلب مع حضرتك.

  utter_ask_user_message:
    - text: |
        وصلت.
        اكتبلي المطلوب باختصار، وأنا هرتّبه لك كطلب واضح قابل للمتابعة.

        مثال: تغيير 5 كشافات في فرع معين، عطل سباكة، صيانة تكييف، أو أي بند مطلوب.

  utter_ask_location:
    - text: |
        تمام، ممكن أعرف المنطقة أو المحافظة؟
        ده بيساعدنا نوجّه الطلب للفريق المناسب.

  utter_ask_area_size:
    - text: |
        ممكن المساحة التقريبية بالمتر؟
        الرقم التقريبي كفاية كبداية.

  utter_default_fallback:
    - text: |
        محتاج أوضح الطلب معاك بشكل أدق.
        أقدر أساعدك في: الصيانة، التشطيب، المقاولات، الهوية التجارية، أو التوريدات.

        اكتبلي الخدمة المطلوبة بكلمة بسيطة، وأنا أكمّل معاك.

  # Alazab Construction
  utter_alazab_about:
    - text: |
        مجموعة العزب بتقدم حلول متكاملة في التنفيذ، التشطيبات، الصيانة، الهوية التجارية، والتوريدات.

        تحب تعرف عن الخدمات، ولا تطلب تواصل من الفريق؟

  utter_alazab_contact:
    - text: |
        تقدر تكتب طلبك هنا، وأنا أوجّهه للفريق المناسب داخل مجموعة العزب.
        لو تحب تواصل مباشر، اكتب نوع الخدمة المطلوبة ورقم التواصل.

  utter_alazab_projects:
    - text: |
        لدينا خبرات في مشروعات تجارية وسكنية وتشغيل وصيانة.
        اكتب نوع المشروع المطلوب، وأنا أرتّب لك المسار المناسب.

  utter_alazab_quote:
    - text: |
        تمام، أقدر أساعدك في طلب عرض سعر.
        اكتب نوع المشروع أو الخدمة المطلوبة، والموقع، وأي تفاصيل متاحة، وأنا هرتّب البيانات للفريق.

  utter_alazab_services:
    - text: |
        خدمات مجموعة العزب تشمل:
        🔧 الصيانة والتشغيل
        ✨ التشطيبات الفاخرة
        🏗️ تجهيز وتنفيذ المشروعات
        🎨 الهوية التجارية وتجهيز المساحات
        📦 التوريدات والخامات

        تحب نبدأ بأي خدمة؟

  utter_alazab_technical_specs:
    - text: |
        أقدر أساعدك في المواصفات الفنية وبنود الأعمال.
        اكتب البند أو نوع العمل المطلوب، وأنا أوضح لك الصياغة المناسبة.

  # Help / FAQ
  utter_ask_feedback:
    - text: |
        رأيك يهمنا جدًا.
        اكتب ملاحظتك أو اقتراحك، وأنا هسجله للفريق المختص.

  utter_ask_help:
    - text: |
        أنا معاك.
        اختار الخدمة اللي محتاجها: صيانة، تشطيب، هوية تجارية، توريدات، أو تواصل مع الفريق.

  utter_faq_location:
    - text: |
        نطاق الخدمة يختلف حسب نوع الطلب وتوافر الفريق.
        اكتب منطقتك ونوع الخدمة المطلوبة، وسأوضح لك أفضل مسار.

  utter_faq_payment:
    - text: |
        طرق الدفع تختلف حسب الخدمة والمرحلة.
        اكتب الخدمة المطلوبة، وسأوضح لك الطريقة الأنسب.

  utter_faq_prices:
    - text: |
        الأسعار تعتمد على نوع الخدمة وحجم الطلب.
        اكتب المطلوب باختصار، وسأساعدك في تقدير أولي أو تحويله للفريق المختص.

  utter_faq_timing:
    - text: |
        مدة التنفيذ تعتمد على نوع الخدمة وحجم العمل.
        اكتب التفاصيل الأساسية، وسأعطيك تصورًا مبدئيًا.

  utter_faq_warranty:
    - text: |
        الضمان يختلف حسب نوع الخدمة والبند المنفذ.
        اكتب نوع العمل، وسأوضح لك التفاصيل المناسبة.

  # Brand Identity
  utter_brand_industries:
    - text: |
        نخدم قطاعات متعددة مثل المطاعم، الكافيهات، الصيدليات، المحلات، المكاتب، والأنشطة التجارية المتخصصة.

        اكتب نوع نشاطك، وأنا أساعدك في تحديد الاتجاه المناسب.

  utter_brand_portfolio:
    - text: |
        أقدر أوضح لك نماذج أعمال الهوية وتجهيز المساحات حسب نوع النشاط.
        اكتب نوع المشروع أو البراند المطلوب تطويره.

  utter_brand_process:
    - text: |
        رحلة الهوية تبدأ من فهم النشاط، ثم بناء الاتجاه البصري، ثم التطبيق على المساحة وتجربة العميل.

        تحب نبدأ بتحليل نشاطك؟

  utter_brand_quote:
    - text: |
        لطلب عرض سعر للهوية التجارية، اكتب:
        1. نوع النشاط
        2. هل المطلوب شعار فقط أم هوية كاملة؟
        3. هل يوجد تجهيز مساحة تجارية؟
        4. الموقع أو المدينة إن وجدت

  utter_brand_services:
    - text: |
        خدمات الهوية تشمل:
        🎨 الشعار والهوية البصرية
        🧭 دليل استخدام العلامة
        🏬 تجهيز واجهات ومساحات تجارية
        📱 تطبيق الهوية على القنوات الرقمية والمطبوعات

        تحب تبدأ من التصميم ولا التنفيذ؟

  utter_brand_complete_identity:
    - text: |
        الهوية الكاملة تشمل الشعار، الألوان، الخطوط، النمط البصري، التطبيقات، ودليل الاستخدام.
        اكتب نوع النشاط، وأنا أساعدك نحدد احتياجك بدقة.

  utter_brand_shop_fitting:
    - text: |
        تجهيز المساحات التجارية عندنا يربط بين الهوية البصرية والتنفيذ الفعلي.
        اكتب نوع النشاط والمساحة، وسأوجّهك للمسار المناسب.

  # Luxury Finishing
  utter_luxury_materials:
    - text: |
        أقدر أساعدك في اختيار خامات مناسبة للتشطيب الراقي حسب الذوق، الاستخدام، والميزانية.

        اكتب نوع المساحة: شقة، فيلا، مكتب، أو مساحة تجارية.

  utter_luxury_portfolio:
    - text: |
        لدينا أعمال تشطيب سكني وتجاري بمستويات مختلفة.
        اكتب نوع المشروع، وسأوجهك للمسار المناسب.

  utter_luxury_quote:
    - text: |
        لطلب عرض سعر تشطيب، اكتب:
        1. نوع الوحدة
        2. المساحة التقريبية
        3. الموقع
        4. المرحلة الحالية: عظم، نصف تشطيب، أو تجديد

  utter_luxury_services:
    - text: |
        خدمات التشطيب تشمل التصميم، اختيار الخامات، التنفيذ، والمتابعة حتى التسليم.

        تحب تبدأ بمعاينة، استشارة، ولا عرض سعر؟

  utter_luxury_timeline:
    - text: |
        مدة التشطيب تعتمد على المساحة ونطاق الأعمال.
        اكتب المساحة والحالة الحالية، وسأعطيك تصورًا أوليًا.

  # Laban Alasfour
  utter_laban_bulk_order:
    - text: |
        لطلب توريد جملة، اكتب نوع المنتج، الكمية، والموقع.
        بعدها نرتب لك الطلب بشكل واضح.

  utter_laban_catalog:
    - text: |
        أقدر أساعدك في كتالوج الخامات والمنتجات.
        اكتب نوع الخامة أو الاستخدام المطلوب.

  utter_laban_contact:
    - text: |
        تقدر تكتب طلب التوريد هنا، وأنا أوجّهه للفريق المختص للمتابعة.

  utter_laban_delivery:
    - text: |
        خدمة التوصيل تعتمد على المنطقة والكمية.
        اكتب الموقع ونوع الطلب، وسأساعدك.

  utter_laban_products:
    - text: |
        لدينا خامات ومنتجات تخدم أعمال التشطيب والتجهيز.
        اكتب نوع المنتج الذي تبحث عنه.

  # UberFix
  utter_uberfix_about:
    - text: |
        UberFix هو مسار الصيانة والتشغيل داخل مجموعة العزب.
        نساعدك في تسجيل طلبات الصيانة، المتابعة، التشغيل، وخدمات الفنيين.

        تحب تسجل طلب صيانة الآن؟

  utter_uberfix_contact:
    - text: |
        تقدر تكتب طلب الصيانة هنا مباشرة.
        وأنا هسجله لك بشكل واضح مع بيانات التواصل المطلوبة.

  utter_uberfix_emergency:
    - text: |
        لو الحالة طارئة، اكتب نوع العطل، المكان، ورقم التواصل.
        وسأتعامل معها كأولوية في التسجيل والمتابعة.

  utter_uberfix_emergency_contact:
    - text: |
        للحالات الطارئة، اكتب العطل والموقع ورقم التواصل.
        كلما كانت التفاصيل أوضح، كان توجيه الفريق أسرع.

  utter_uberfix_features:
    - text: |
        UberFix يساعدك في:
        🔧 تسجيل طلبات الصيانة
        📍 متابعة حالة الطلب
        🧾 تنظيم بيانات الأعطال
        👷 توجيه الفني المناسب
        📊 تحسين التشغيل والمتابعة

  utter_uberfix_feedback:
    - text: |
        رأيك في خدمة UberFix يهمنا.
        اكتب ملاحظتك أو تقييمك، وأنا هسجله للفريق المختص.

  utter_uberfix_fire_safety:
    - text: |
        نقدر نسجل طلبات تخص أنظمة الحريق والسلامة.
        اكتب نوع المشكلة أو البند المطلوب، والموقع، وسأرتب الطلب.

  utter_uberfix_masonry_painting:
    - text: |
        نقدر نسجل طلبات الدهانات، المحارة، الترميمات، والأعمال المدنية الخفيفة.
        اكتب المطلوب والموقع، وأنا هسجله لك.

  utter_uberfix_new_request:
    - text: |
        تمام، نبدأ طلب صيانة جديد.
        هحتاج اسم حضرتك، رقم التواصل، ثم وصف مختصر للمطلوب.

  utter_uberfix_order_number:
    - text: |
        لو معاك رقم الطلب، ارسله لي.
        هساعدك في المتابعة حسب البيانات المتاحة.

  utter_uberfix_order_status:
    - text: |
        لمتابعة حالة الطلب، اكتب رقم الطلب أو رابط التتبع إن وجد.
        وسأساعدك في معرفة الخطوة الحالية.

  utter_uberfix_price:
    - text: |
        تكلفة الصيانة تعتمد على نوع العطل، الموقع، وقطع الغيار إن وجدت.
        اكتب المطلوب، وسأساعدك في تسجيل الطلب أو تقدير المسار المناسب.

  utter_uberfix_price_warranty:
    - text: |
        السعر والضمان يختلفان حسب نوع الخدمة والبند المنفذ.
        اكتب نوع العطل أو الخدمة المطلوبة، وسأوضح لك المسار الأنسب.

  utter_uberfix_report_problem:
    - text: |
        اكتب المشكلة بوضوح: نوع العطل، المكان، وهل الحالة متكررة أم جديدة.
        وأنا هسجلها لك كبلاغ قابل للمتابعة.

  utter_uberfix_request:
    - text: |
        تمام، نبدأ طلب الصيانة.
        اكتب نوع العطل أو الخدمة المطلوبة، وأنا هسجلها لك بشكل واضح.

  utter_uberfix_request_ac:
    - text: |
        لصيانة التكييف، اكتب نوع المشكلة: تبريد ضعيف، تسريب، تنظيف، فريون، أو عطل تشغيل.
        واذكر الموقع إن أمكن.

  utter_uberfix_request_electric:
    - text: |
        لصيانة الكهرباء، اكتب البند المطلوب: كشافات، مفاتيح، لوحة كهرباء، أسلاك، أو عطل مفاجئ.
        وسأرتب الطلب.

  utter_uberfix_request_plumbing:
    - text: |
        لصيانة السباكة، اكتب نوع المشكلة: تسريب، صرف، خلاط، سخان، أو ضغط مياه.
        وسأساعدك في تسجيل الطلب.

  utter_uberfix_reschedule:
    - text: |
        لإعادة جدولة طلب صيانة، اكتب رقم الطلب والموعد المناسب الجديد.
        وسأرتب البيانات للفريق.

  utter_uberfix_schedule:
    - text: |
        لتحديد موعد صيانة، اكتب الخدمة المطلوبة، الموقع، والموعد المناسب.
        وسأرتب الطلب بشكل واضح.

  utter_uberfix_services:
    - text: |
        UberFix يساعدك في الصيانة والتشغيل والمتابعة.
        الخدمات تشمل:
        ⚡ كهرباء
        💧 سباكة
        ❄️ تكييف
        🧱 دهانات وأعمال مدنية
        🚒 أنظمة حريق وسلامة
        🛠️ أعمال تشغيل وصيانة متنوعة

        اكتب الخدمة المطلوبة، وأنا أكمل معاك.

  utter_uberfix_subscribe:
    - text: |
        تقدر تطلب اشتراك صيانة دوري حسب احتياجك.
        اكتب نوع المكان وعدد الزيارات المطلوبة، وسأساعدك في تحديد المسار المناسب.

  utter_uberfix_subscription:
    - text: |
        اشتراكات الصيانة تساعدك في المتابعة الدورية وتقليل الأعطال المفاجئة.
        اكتب نوع النشاط أو المكان، وسأوضح لك الاختيارات المناسبة.

  utter_uberfix_subscription_basic:
    - text: |
        الاشتراك الأساسي مناسب للمتابعة الخفيفة والزيارات المحدودة.
        اكتب نوع المكان وحجم التشغيل، وسأساعدك في تقييم مناسبته.

  utter_uberfix_subscription_advanced:
    - text: |
        الاشتراك المتقدم مناسب للأماكن التي تحتاج متابعة أكثر وانتظام أعلى.
        اكتب طبيعة المكان وعدد الفروع إن وجد.

  utter_uberfix_subscription_premium:
    - text: |
        الاشتراك المميز مناسب للتشغيل المكثف والأولوية في المتابعة.
        اكتب طبيعة النشاط وحجم التشغيل.

  utter_uberfix_subscription_plans:
    - text: |
        لدينا أكثر من مستوى لاشتراكات الصيانة حسب حجم التشغيل.
        اكتب نوع المكان وعدد الفروع أو حجم الاستخدام، وسأساعدك في اختيار الأنسب.

  utter_uberfix_supplies:
    - text: |
        لو محتاج خامات أو قطع مرتبطة بالصيانة، اكتب نوع البند والكمية التقريبية.
        وسأوجه الطلب للمسار المناسب.

  utter_uberfix_track:
    - text: |
        لتتبع طلب الصيانة، ارسل رقم الطلب أو رابط التتبع.
        وسأساعدك في معرفة الحالة الحالية.

  utter_uberfix_tracking:
    - text: |
        أقدر أساعدك في متابعة الطلب.
        اكتب رقم الطلب أو رابط التتبع، وسأكمل معك.

  utter_uberfix_working_hours:
    - text: |
        مواعيد العمل والمتابعة تختلف حسب نوع الخدمة والحالة.
        اكتب نوع الطلب، وسأوضح لك المسار المناسب.

  # FAQ / Flow helpers
  utter_ask_if_more_faqs:
    - text: |
        هل تحب تبحث عن سؤال آخر، ولا نبدأ طلب مختلف؟

  utter_ask_reason_for_handoff:
    - text: |
        اكتبلي سبب رغبتك في التحدث مع ممثل من الفريق، عشان أوصل طلبك بشكل أوضح.

  utter_offer_human_handoff:
    - text: |
        تحب أحوّل المحادثة لممثل من الفريق الآن؟

  utter_human_handoff_immediate:
    - text: |
        تمام، جاري تحويلك لأحد ممثلي الفريق.
        لحظات وهيكون معاك.

  utter_human_handoff_queue:
    - text: |
        أنت في قائمة الانتظار.
        رقمك في الطابور: {queue_position}

  utter_agent_connected:
    - text: |
        تم الاتصال بممثل خدمة العملاء.
        الفريق معاك الآن.

  utter_human_handoff_offline:
    - text: |
        الفريق غير متاح حاليًا.
        أقدر أسجل طلبك ونخليهم يتواصلوا معاك في أقرب وقت.

  utter_offer_alternative_contact:
    - text: |
        تحب نكمل التواصل على واتساب مباشرة؟

  utter_provide_whatsapp:
    - text: |
        تقدر تتواصل معنا عبر واتساب، وهيتم الرد عليك في أقرب وقت.

  utter_handoff_cancelled:
    - text: |
        تم إلغاء التحويل.
        نكمل هنا، قولّي تحب أساعدك في إيه؟

  utter_receive_escalation:
    - text: |
        تمام، هرفع الموضوع للمسؤول المختص.
        اكتبلي التفاصيل بوضوح عشان أوصلها بشكل صحيح.

  utter_escalate_to_manager:
    - text: |
        تم إرسال التفاصيل للمسؤول المختص.
        والفريق هيتابع مع حضرتك في أقرب وقت.

  utter_confirm_cancel:
    - text: |
        هل حضرتك متأكد من إلغاء الطلب؟

