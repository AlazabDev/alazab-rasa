version: "3.1"

# ══════════════════════════════════════════════════════════════
#  data/system/patterns/patterns.yml
#  CALM System Patterns — Rasa Pro built-in flows
#  ملاحظة: action_correct_flow_slot و session_start
#  هي أدوات مدمجة في Rasa Pro CALM ولا تحتاج تنفيذاً مخصصاً.
# ══════════════════════════════════════════════════════════════

flows:
  pattern_cannot_handle:
    description: "يتم استدعاؤه عندما لا يفهم البوت طلب المستخدم"
    steps:
      - action: utter_out_of_scope
        next: END

  pattern_completed:
    description: "إشعار عند اكتمال المهمة بنجاح"
    name: "pattern completed"
    steps:
      - noop: true
        next: END

  pattern_correction:
    description: "يسمح للمستخدم بتصحيح معلومة أخطأ فيها"
    name: "تصحيح المعلومات"
    steps:
      - action: action_correct_flow_slot
        next: END

  pattern_session_start:
    description: "بداية الجلسة والترحيب بالمستخدم"
    name: "بداية المحادثة"
    steps:
      - action: utter_greet
        next: END

  pattern_cancel_flow:
    description: "يسمح للمستخدم بإلغاء الطلب الحالي"
    name: "إلغاء العملية"
    steps:
      - action: utter_confirm_cancel
        next:
          - if: intent = "affirm"
            then: END
          - else: RESUME
