version: "3.1"

rules:
  - rule: خدمات UberFix
    steps:
      - intent: ask_uberfix_services
      - action: utter_uberfix_services

  - rule: تتبع طلب UberFix
    steps:
      - intent: ask_uberfix_tracking
      - action: action_uberfix_track_request

  - rule: باقات UberFix
    steps:
      - intent: ask_uberfix_subscription
      - action: action_uberfix_show_subscriptions

  - rule: طوارئ UberFix
    steps:
      - intent: ask_uberfix_emergency
      - action: utter_uberfix_emergency
