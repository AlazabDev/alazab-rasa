        صياغة رد مقترحة لعميل يسأل عن تنظيف الأرضيات المجاورة للأماكن المطلوب بياضها مع عمل وقاية لحماية تلك الأرضيات من أعمال البياض.
        نبدأ بتأكيد فهم الطلب ثم نطلب أهم معلومة ناقصة فقط.
        اجمع بيانات الفرع، نقطة العطل، آخر تدخل تم على نفس البند، وما إن كانت هناك خامات متوفرة بالموقع.
        السياق التشغيلي للبند: تنظيف الأرضيات المجاورة للأماكن المطلوب بياضها مع عمل وقاية لحماية تلك الأرضيات من أعمال البياض، وهو مرتبط بتصنيف تحديد أولوية داخل منظومة العزب.
        إذا كان البند ضمن تجهيز فرع جديد، يُربط بالمخططات والمقايسة وبنود التسليم لا كتذكرة منفردة.
        إن كان البند صيانة متكررة، تُسأل الجهة عن تاريخ آخر صيانة لتحديد سبب التكرار.
        يتم حفظ هذا الوصف كمفردة إنتاج تساعد البوت على فهم طلبات العملاء حتى لو جاءت بصياغة مختصرة.
        إذا كتب العميل طلبًا مختلطًا، يتم فصل الطلب إلى خدمة أساسية وخدمة تابعة بدل الرد برد واحد مبهم.

  utter_main_production_context_015:
    - text: |
        مرجع قرار للبوت: تقاس أعمال البياض هندسيا مع خصم مسطحات الفتحات كالأبواب والشبابيك والمكيفات ومراوح الشفط وغيرها ومسطحات البياض الواقعة أسفل وبجانب التباليط التي أعلى السقف المستعار ان وجدت مع احتساب جوانب الفتحات.
        إذا كانت الرسالة عامة، حوّلها إلى طلب يحتوي نوع العمل ومكانه ودرجة الاستعجال.
        اجمع اسم النشاط، طبيعة الاستخدام اليومي، وعدد القطع أو المسطح التقريبي قبل تحويله للفريق.
        المطلوب من البوت أن يحول العبارة إلى طلب منظم دون وعد بسعر أو مدة قبل اكتمال البيانات.
        في الأعمال التي تمس السلامة أو الكهرباء أو الحريق، لا تُعطى حلول مرتجلة عبر المحادثة.
        بعد اكتمال البيانات، يحوّل الطلب إلى الفريق المختص مع ملاحظة فنية مختصرة وسياق الصور.
        في الأبواب والزجاج، يتم تحديد نوع الباب، اتجاه الحركة، حالة المفصلات أو ماكينة الغلق، ووجود خطر على المستخدمين.
        الملف الرئيسي لا يستبدل الملفات الفرعية؛ وظيفته بناء قرار المسار وحفظ لغة الإنتاج المشتركة.

  utter_main_production_context_016:
    - text: |
        تحويل لمعاينة: لياسة للواجهات الخارجية والعمل يتم حسب تعليمات المهندس المشرف.
        هذا البند لا يرد عليه البوت بسعر مباشر؛ يربطه بالمعاينة أو المراجعة حسب التفاصيل.
        اجمع بيانات التواصل، العنوان، أولويات التنفيذ، وهل هناك موعد تسليم مرتبط بهذا البند.
        السياق التشغيلي للبند: لياسة للواجهات الخارجية والعمل يتم حسب تعليمات المهندس المشرف، وهو مرتبط بتصنيف تحويل لمعاينة داخل منظومة العزب.
        يُراعى تنفيذ العمل طبقًا لأصول الصناعة وتعليمات الفريق المختص، مع توثيق ما تم قبل الإغلاق.
        ينتقل البند للمهندس أو مسؤول الصيانة بحسب نوع الخدمة، مع منع تضخيم الوعود للعميل.
        في الوحدات الخشبية، يهم تحديد المقاس، نوع القشرة أو الدهان، أماكن التحميل، وطريقة التثبيت داخل الفرع.
        عند التعارض بين السعر والواقع الفني، يقدم البوت طلب المعاينة أو المراجعة على أي رقم غير مؤكد.

  utter_main_production_context_017:
    - text: |
        Alazab Group Main Domain / تحويل لمقايسة / مخاطَب الرد: إدارة مشتريات.
        هذا السياق يصلح لتوجيه المحادثة نحو معاينة أو أمر تشغيل وليس لإصدار حكم نهائي.
        السياق التشغيلي للبند: لياسة للجدران الداخلية والعمل يتم حسب تعلميات المهندس المشرف، وهو مرتبط بتصنيف تحويل لمقايسة داخل منظومة العزب.
        اجمع المقاس التقريبي، مكان التنفيذ، درجة الاستعجال، وأي صور أو فيديو يوضح العطل أو مساحة العمل.
        عند نقص البيانات، يطلب البوت معلومة واحدة حاسمة بدل إرباك العميل بقائمة طويلة.
        يتم توضيح أن بعض البنود تحتاج عينة أو اعتماد قبل التنفيذ، خصوصًا التشطيبات والواجهات.
        في الوحدات الخشبية، يهم تحديد المقاس، نوع القشرة أو الدهان، أماكن التحميل، وطريقة التثبيت داخل الفرع.
        أي طلب يحتوي خطورة تشغيل أو سلامة أو توقف فرع يتم رفعه قبل الطلبات العادية.

  utter_main_production_context_018:
    - text: |
        Alazab Group Main Domain: إغلاق بيانات ناقصة — صياغة إنتاج لطلب واقعي.
        السياق التشغيلي للبند: 5- أعمال التباليط والأرضيات والتكسية :-، وهو مرتبط بتصنيف إغلاق بيانات ناقصة داخل منظومة العزب.
        يجب أن يفهم البوت الفرق بين استفسار عام وطلب قابل للتنفيذ يحتاج بيانات تشغيل.
        اجمع بيانات الفرع، نقطة العطل، آخر تدخل تم على نفس البند، وما إن كانت هناك خامات متوفرة بالموقع.
        لا يتم اعتبار البند منتهيًا إلا بعد اختبار التشغيل أو مراجعة الشكل النهائي حسب نوع الخدمة.
        إن كان هناك خطر تشغيل أو تسريب أو كهرباء مكشوفة، تُرفع الأولوية فورًا قبل أي تفاصيل إضافية.
        يتم حفظ هذا الوصف كمفردة إنتاج تساعد البوت على فهم طلبات العملاء حتى لو جاءت بصياغة مختصرة.
        يجب أن تكون الخطوة التالية قابلة للتنفيذ: إرسال صورة، تحديد فرع، فتح طلب، أو تحديد موعد معاينة.

  utter_main_production_context_019:
    - text: |
        عند ورود عبارة قريبة من: التوريد لجميع المواد اللازمة .
        التصنيف العملي: رد خدمة عملاء، والمخاطَب المتوقع: خدمة عملاء.
        العبارة تُستخدم كمعجم إنتاج يربط بين كلام العميل ولغة الفني والمقايسة.
        اجمع اسم النشاط، طبيعة الاستخدام اليومي، وعدد القطع أو المسطح التقريبي قبل تحويله للفريق.
        تُستخدم اللغة الهادئة والواضحة لأن العميل يريد حلًا، والفريق يحتاج بيانات قابلة للتنفيذ.
        في حالة التوريد، يُراجع التوفر والمقاس والبديل المقبول قبل تأكيد أي التزام.
        يتم حفظ هذا الوصف كمفردة إنتاج تساعد البوت على فهم طلبات العملاء حتى لو جاءت بصياغة مختصرة.
        قاعدة التوجيه: الصيانة القائمة تذهب إلى UberFix، تجهيز الفروع إلى Brand Identity، السكني الراقي إلى Luxury Finishing، الخامات إلى Laban Alasfour، والأعمال الهندسية العامة إلى Alazab Construction.

  utter_main_production_context_020:
    - text: |
        Alazab Group Main Domain يعالج هذا البند تحت مسار ملاحظة للفريق الداخلي.
        السياق التشغيلي للبند: المواد اللاصقة لبلاط القيشاني من ( السيربو ) والفنيل بمواد جيدة معتمدة من المهندس المشرف ، وهو مرتبط بتصنيف ملاحظة للفريق الداخلي داخل منظومة العزب.
        اجمع بيانات التواصل، العنوان، أولويات التنفيذ، وهل هناك موعد تسليم مرتبط بهذا البند.
        لا يُغلق الرد قبل تحديد نقطة التنفيذ أو السبب المباشر للطلب.
        يتم إنشاء تذكرة تشغيل تتضمن وصف البند، موقع التنفيذ، درجة الأولوية، والمرفقات.
        إذا ظهر اختلاف بين كلام العميل والصورة، تُقدَّم الصورة وسياق الموقع على الوصف اللفظي.
        في الرخام والأرضيات، يجب ذكر المقاس والمنسوب والفواصل وطريقة اللصق أو التثبيت قبل اعتماد أي بند.
        إذا كتب العميل طلبًا مختلطًا، يتم فصل الطلب إلى خدمة أساسية وخدمة تابعة بدل الرد برد واحد مبهم.

  utter_main_production_context_021:
    - text: |
        بند إنتاج: تركيب وزرة رخام أو جرانيت مشطوفة بسمك(1سم) وبارتفاع(10 سم) لأرضيات بلاط الموزايكو والرخام ووزرة سيراميك لأرضيات البلاط السيراميك ومن نفس نوع البلاط.
        يُستخدم داخل محادثات Alazab Group Main Domain لتقليل الغموض بين العميل والفريق.
