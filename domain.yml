responses:
  utter_greet:
  - text: 'أهلاً وسهلاً! 👋😊

      أنا عزبوت، رفيقك في مجموعة العزب!


      إيه اللي ممكن أساعدك فيه النهارده؟ 🎯

      🔧 صيانة واحترافية مع UberFix

      🏗️ مقاولات وتجهيز مشروعات

      ✨ تشطيبات فاخرة تعمل فرق

      🎨 هوية تجارية بتفرق فعلاً

      📦 توريدات وخامات بجودة عالية


      قولّي وأنا جاهز! 💪

      '
  - text: 'يا هلا يا هلا! 🌟

      أنا عزبوت، وأنا هنا عشان أريّحك وأحل كل حاجة بسرعة 😄


      مقاولات؟ تشطيب؟ صيانة؟ هوية تجارية؟ توريدات؟

      كلها في المكان الصح، قولّي تحب نبدأ بإيه! 🚀

      '
  utter_goodbye:
  - text: 'كان شرف ليّا إني أساعدك! 🤝✨

      مجموعة العزب دايماً جنبك في أي خطوة.

      ربنا يوفقك ويكمّل عليك بالخير! 👋😊

      '
  - text: 'تسلم يا صاحبي! 🌟

      أي وقت تحتاجنا، عزبوت في الخدمة 24/7 😄

      يوم سعيد وموفق إن شاء الله! 🤍

      '
  utter_thanks:
  - text: 'ولا يهمك خالص! 😄🤍

      ده واجبنا وأكثر، وجودك بيسعدنا فعلاً.

      في أي حاجة تانية، أنا هنا! 💪

      '
  - text: 'إيه الكلام ده! 😊

      إحنا اللي شاكرين إنك معانا.

      تحب تكمل في حاجة تانية؟

      '
  utter_bot_challenge:
  - text: 'أيوه بكل فخر! 🤖✨

      أنا عزبوت، المساعد الذكي لمجموعة العزب.

      مش بس بوت عادي، أنا بساعدك في الصيانة، التشطيبات، الهوية التجارية، التوريدات،
      وكمان أوصلك بالفريق المناسب!

      قولّي تحب إيه؟ 😄

      '
  utter_out_of_scope:
  - text: 'آه، الطلب ده بره تخصصي شوية 😅

      بس أنا شاطر في حاجات تانية كتير!


      أقدر أساعدك في:

      🔧 الصيانة والتشغيل

      🏗️ المقاولات والمشروعات

      ✨ التشطيبات الفاخرة

      🎨 الهوية التجارية

      📦 التوريدات والخامات


      تحب نبدأ بأي خدمة منهم؟ 😊

      '
  utter_default_fallback:
  - text: 'عفواً، مش فاهم المطلوب كويس كده 🙈

      بس مش مشكلة، جرب تكتبلي بكلمة بسيطة زي:

      "صيانة" أو "تشطيب" أو "هوية" أو "توريدات"

      وأنا هكمّل معاك على طول! 🚀

      '
  - text: 'يمكن الطلب وصلني بشكل غلط شوية 😅

      مش مشكلة، جرب تاني بكلمة واضحة.

      مثلاً: "طلب صيانة"، "عرض سعر تشطيب"، أو "هوية تجارية"

      وأنا فاهمك! 😄

      '
  utter_ask_user_name:
  - text: 'تمام، يلا نبدأ! 🎯

      بس الأول محتاج اسمك الكريم عشان أسجّل الطلب صح؟ 😊

      '
  - text: 'حاضر يا فندم! 🤩

      بس قبل أي حاجة، قولّي اسمك عشان نتعامل بشكل شخصي أحلى! 😄

      '
  utter_ask_user_phone:
  - text: 'تمام يا {user_name}! 👌

      دلوقتي محتاج رقم موبايلك عشان الفريق يقدر يتابع معاك بسرعة. 📱

      '
  - text: 'ممتاز يا {user_name}! 🌟

      اكتبلي رقمك، والفريق هيكون معاك في أقرب وقت! 💪

      '
  utter_ask_user_message:
  - text: 'وصلت تمام! ✅

      دلوقتي قولّي المطلوب بالتفصيل الملل 😄

      مثلاً: "تغيير 5 كشافات في الفرع الفلاني"، "عطل سباكة"، "صيانة تكييف"

      وأنا هرتّبها لك زي الفل! 🔧

      '
  - text: 'أوعى تحتشم! 😊

      اكتبلي كل التفاصيل، وأنا هحوّلها لطلب واضح ومنظم جاهز للمتابعة. ✍️

      '
  utter_ask_location:
  - text: 'قريب! 📍

      بس محتاج منك المنطقة أو المحافظة عشان نوصّللك الفريق الصح. 🗺️

      '
  - text: 'تمام يا فندم! 😊

      فين الموقع؟ المنطقة أو المحافظة كفاية كبداية. 📍

      '
  utter_ask_area_size:
  - text: 'تقريبي بقى، مش هنعمل هندسة دقيقة 😄

      المساحة كام متر تقريباً؟ الرقم التقريبي كافي! 📐

      '
  utter_uberfix_about:
  - text: 'UberFix هو ذراع الصيانة والتشغيل في مجموعة العزب! 💪🔧

      فنيين محترفين، متابعة سريعة، وحلول تدوم.


      تسجّل طلب دلوقتي وهنكون معاك في أقرب وقت! 🚀

      '
  utter_uberfix_services:
  - text: 'UberFix عنده حل لكل حاجة! 😄🔧


      الخدمات شاملة:

      ⚡ كهرباء — من الكشاف للوحة الكاملة

      💧 سباكة — تسريب أو صرف أو ضغط

      ❄️ تكييف — تنظيف وصيانة وفريون

      🧱 دهانات وأعمال مدنية

      🚒 أنظمة حريق وسلامة

      🛠️ أعمال تشغيل متنوعة


      اكتب الخدمة، وأنا معاك على طول! 💪

      '
  utter_uberfix_new_request:
  - text: 'يلا بينا! 🚀

      هنسجّل طلب صيانة جديد خطوة بخطوة.

      أولاً اسمك، بعدين رقمك، وبعدين وصف مختصر للي محتاجه. ✍️

      '
  utter_uberfix_request:
  - text: 'تمام! نبدأ طلب الصيانة 🔧

      اكتبلي نوع العطل أو الخدمة المطلوبة، وأنا هسجّلها بشكل واضح ومنظم! 📋

      '
  - text: 'حاضر يا فندم! 💪

      اكتبلي المطلوب، وأنا هحوّله لطلب احترافي قابل للمتابعة فوراً. ✅

      '
  utter_uberfix_request_electric:
  - text: 'تمام، صيانة كهرباء! ⚡

      قولّي البند المطلوب:

      كشافات، مفاتيح، لوحة كهرباء، أسلاك، أو عطل مفاجئ؟


      واذكر الموقع وأنا هرتب الطلب! 🔌

      '
  utter_uberfix_request_plumbing:
  - text: 'تمام، صيانة سباكة! 💧

      نوع المشكلة إيه؟

      تسريب، صرف، خلاط، سخان، أو ضغط مياه؟


      فريق السباكة جاهز! 🔧

      '
  utter_uberfix_request_ac:
  - text: 'تمام، صيانة تكييف! ❄️

      نوع المشكلة إيه؟

      تبريد ضعيف، تسريب، تنظيف، فريون، أو عطل تشغيل؟


      واذكر الموقع لو أمكن وأنا أكمل معاك! 🌬️

      '
  utter_uberfix_emergency:
  - text: 'فاهم إن الموضوع عاجل! 🚨

      اكتبلي دلوقتي:

      ➊ نوع العطل

      ➋ الموقع بالظبط

      ➌ رقم التواصل


      وهتعامل معاها كأولوية قصوى فوراً! ⚡

      '
  utter_uberfix_emergency_contact:
  - text: 'حالة طارئة؟ مش قلقان! 🚨💪

      اكتبلي العطل والموقع والرقم دلوقتي.

      كلما كانت التفاصيل أوضح، كان الفريق أسرع في الوصول! ⏱️

      '
  utter_uberfix_track:
  - text: 'هنتابع طلبك على طول! 📍

      ابعتلي رقم الطلب أو رابط التتبع وأنا هجيبلك آخر أبديت. 🔍

      '
  utter_uberfix_tracking:
  - text: 'ممتاز! هنعرف الطلب فين دلوقتي 🔍

      اكتبلي رقم الطلب أو رابط التتبع وأنا أكمل معاك على طول! 📱

      '
  utter_uberfix_order_status:
  - text: 'طبعاً أقدر أعرفك بآخر حالة الطلب! 📋

      بس محتاج رقم الطلب أو رابط التتبع عشان أجيبلك المعلومة الصح. 🔎

      '
  utter_uberfix_report_problem:
  - text: 'معلش على الإزعاج ده! 😟

      بس ابعتلي تفاصيل المشكلة:

      نوع العطل + المكان + هي متكررة ولا جديدة؟


      وهسجّلها كبلاغ رسمي قابل للمتابعة والحل! ✅

      '
  utter_uberfix_price:
  - text: 'بخصوص التكلفة 💰

      بتختلف حسب نوع العطل، الموقع، وقطع الغيار لو محتاجة.

      اكتبلي المطلوب وهساعدك في معرفة تقدير أولي أو أوجّهك للفريق! 😊

      '
  utter_uberfix_price_warranty:
  - text: 'سؤال مهم! 💡

      السعر والضمان بيختلفوا حسب نوع الخدمة والبند المنفذ.

      اكتبلي نوع العطل وهوضحلك كل التفاصيل بوضوح! 📋

      '
  utter_uberfix_working_hours:
  - text: 'المواعيد بتختلف حسب نوع الخدمة والحالة 🕐

      اكتبلي نوع الطلب وهوضحلك المسار والمواعيد المناسبة! 😊

      '
  utter_uberfix_subscription_plans:
  - text: 'عندنا باقات صيانة لكل الاحتياجات! 📦✨

      اكتبلي نوع المكان وعدد الفروع وحجم الاستخدام،

      وهساعدك تختار الأنسب والأوفر ليك! 💪

      '
  utter_uberfix_subscribe:
  - text: 'اشتراك الصيانة الدوري ده قرار ذكي جداً! 🧠✨

      اكتبلي نوع المكان وعدد الزيارات المطلوبة،

      وهساعدك تختار الباقة المناسبة! 💪

      '
  utter_uberfix_subscription:
  - text: 'اشتراكات الصيانة بتريّحك من التفكير في الأعطال المفاجئة! 😄🔧

      اكتبلي نوع النشاط أو المكان، وهوضحلك الاختيارات المتاحة! 📋

      '
  utter_uberfix_subscription_basic:
  - text: 'الباقة الأساسية مناسبة للمتابعة الخفيفة! 😊

      اكتبلي نوع المكان وحجم التشغيل عشان أقيّم معاك لو مناسبة فعلاً. ✅

      '
  utter_uberfix_subscription_advanced:
  - text: 'الباقة المتقدمة لو محتاج متابعة أكثر وانتظام أعلى! 📈

      اكتبلي طبيعة المكان وعدد الفروع وهكمّل معاك. 💪

      '
  utter_uberfix_subscription_premium:
  - text: 'الباقة المميزة للتشغيل المكثف وأولوية المتابعة! ⭐

      اكتبلي طبيعة النشاط وحجم التشغيل وهعملك توصية دقيقة. 🎯

      '
  utter_uberfix_features:
  - text: 'UberFix عنده كل اللي محتاجه! 💪😄


      ✅ تسجيل طلبات الصيانة بسهولة

      📍 متابعة حالة الطلب لحظة بلحظة

      🧾 تنظيم وتوثيق الأعطال

      👷 توجيه الفني الأنسب

      📊 تحسين مستوى التشغيل والمتابعة

      '
  utter_uberfix_feedback:
  - text: 'رأيك أهم حاجة عندنا! 🌟

      اكتبلي ملاحظتك أو تقييمك بصراحة تامة،

      وهوصّله للفريق المختص فوراً عشان نتحسن! 📝

      '
  utter_uberfix_fire_safety:
  - text: 'أنظمة الحريق والسلامة ليها أولوية قصوى عندنا! 🚒🔴

      اكتبلي نوع المشكلة أو البند المطلوب والموقع،

      وهرتب الطلب بالجدية اللي يستحقها! ✅

      '
  utter_uberfix_masonry_painting:
  - text: 'دهانات ومحارة وترميمات؟ إحنا عندنا الحل! 🧱🎨

      اكتبلي المطلوب والموقع، وهسجّله وأوجّهه للفريق المختص! 💪

      '
  utter_uberfix_order_number:
  - text: 'ابعتلي رقم الطلب وأنا هجيبلك كل المعلومات! 🔢

      لو مش معاك، قولّي وهنساعدك تجيبه بطريقة تانية. 😊

      '
  utter_uberfix_reschedule:
  - text: 'تغيير الموعد؟ لا مشكلة خالص! 📅😊

      اكتبلي رقم الطلب والموعد الجديد المناسب لحضرتك،

      وهرتّب الأمور على طول! ✅

      '
  utter_uberfix_schedule:
  - text: 'يلا نحدد موعد الصيانة! 📅

      اكتبلي الخدمة المطلوبة، الموقع، والموعد الأنسب ليك،

      وهرتبه بشكل واضح ومنظم! ✅

      '
  utter_uberfix_contact:
  - text: 'اكتب طلبك هنا مباشرة وأنا هسجّله بكل التفاصيل! 📋

      اسمك ورقمك ونوع الطلب وأنا أكمل الباقي! 😊

      '
  utter_uberfix_supplies:
  - text: 'محتاج خامات أو قطع غيار؟ 🔩

      اكتبلي نوع البند والكمية التقريبية،

      وهوجّه الطلب للمسار الصح فوراً! ✅

      '
  utter_alazab_about:
  - text: 'مجموعة العزب! 🏗️✨

      حلول متكاملة من التنفيذ والتشطيبات للصيانة والهوية التجارية والتوريدات.

      خبرة حقيقية، جودة واضحة، ونتائج بتتكلم عن نفسها! 💪


      تحب تعرف أكثر أو تطلب تواصل مع الفريق مباشرة؟ 😊

      '
  utter_alazab_services:
  - text: 'مجموعة العزب عندها كل اللي محتاجه! 🏆


      🔧 الصيانة والتشغيل مع UberFix

      ✨ تشطيبات فاخرة بأعلى معايير

      🏗️ تجهيز وتنفيذ مشروعات متكاملة

      🎨 هوية تجارية وتجهيز مساحات

      📦 توريدات وخامات بجودة عالية


      تحب تبدأ بأي خدمة؟ الكلمة كافية! 😄

      '
  utter_alazab_quote:
  - text: 'عرض سعر؟ ممتاز! 📊

      اكتبلي:

      نوع المشروع + الموقع + أي تفاصيل عندك

      وأنا هرتّب البيانات للفريق المختص بشكل احترافي! 💪

      '
  utter_alazab_projects:
  - text: 'عندنا خبرات واسعة في مشروعات تجارية وسكنية وتشغيل وصيانة! 🏆

      اكتبلي نوع المشروع المطلوب، وأنا هرتّبلك المسار المناسب خطوة بخطوة. 🗺️

      '
  utter_alazab_contact:
  - text: 'اكتب طلبك هنا وأنا أوصّله للفريق المناسب داخل مجموعة العزب فوراً! ✅

      لو عايز تواصل مباشر، اكتب نوع الخدمة ورقم تواصلك وأنا هرتّب. 📞

      '
  utter_alazab_technical_specs:
  - text: 'المواصفات الفنية؟ إحنا بنحبها! 🤓📋

      اكتبلي البند أو نوع العمل المطلوب، وأنا هوضحلك الصياغة الفنية المناسبة! ✅

      '
  utter_luxury_services:
  - text: 'تشطيب بيفرق فعلاً؟ إحنا عندنا الجواب! ✨🏠

      من التصميم لاختيار الخامات للتنفيذ للتسليم، إحنا معاك في كل خطوة!


      تحب تبدأ بمعاينة، استشارة، أو عرض سعر؟ 😊

      '
  utter_luxury_quote:
