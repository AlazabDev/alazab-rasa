  utter_ask_reason_for_handoff:
  - text: ما سبب رغبتك في التحدث مع ممثل خدمة العملاء؟
  utter_offer_human_handoff:
  - text: هل تريد تحويل المحادثة إلى ممثل الآن؟
  utter_human_handoff_immediate:
  - text: ممثل خدمة العملاء سيتحدث معك الآن. برجاء الانتظار لحظة.
  utter_human_handoff_queue:
