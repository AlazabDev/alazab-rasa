slots:
  brand:
    type: text
    mappings:
    - type: from_llm
  service_type:
    type: text
    mappings:
    - type: custom
  user_name:
    type: text
    mappings:
    - type: from_llm
  user_phone:
    type: text
    mappings:
    - type: from_llm
  user_message:
    type: text
    mappings:
    - type: from_llm
  location:
    type: text
    mappings:
    - type: custom
  area_size:
    type: text
    mappings:
    - type: from_llm
  order_id:
    type: text
    mappings:
    - type: from_llm
  problem_type:
    type: text
    mappings:
    - type: from_llm
  subscription_type:
    type: text
    mappings:
