version: "3.1"

# ══════════════════════════════════════════════════════════════
#  domain.yml — الملف المركزي لإدارة مجموعة العزب
# ══════════════════════════════════════════════════════════════

includes:
  - domain/general.yml
  - domain/alazab.yml
  - domain/luxury_finishing.yml
  - domain/brand_identity.yml
  - domain/laban_alasfour.yml
  - domain/uberfix.yml

# ══════════════════════════════════════════════════════════════
#  Global Intents — الـ Intents المشتركة لكل البراندات
# ══════════════════════════════════════════════════════════════
intents:
  - greet
  - goodbye
  - thanks
  - affirm
  - deny
  - bot_challenge
  - out_of_scope
  - session_start

# ══════════════════════════════════════════════════════════════
#  Global Slots — الـ Slots الموحدة للذكاء الاصطناعي (CALM)
# ══════════════════════════════════════════════════════════════
slots:
  brand:
    type: text
    mappings:
      - type: from_llm

  service_type:
    type: text
    mappings:
      - type: from_llm

  user_name:
    type: text
    mappings:
      - type: from_llm

  user_phone:
    type: text
    mappings:
      - type: from_llm

  location:
    type: text
    mappings:
      - type: from_llm

  area_size:
    type: text
    mappings:
      - type: from_llm

  order_id:
    type: text
    mappings:
      - type: from_llm

  problem_type:
    type: text
    mappings:
      - type: from_llm

  subscription_type:
    type: text
    mappings:
      - type: from_llm

  confirm_human_handoff:
    type: categorical
    values:
      - "Yes"
      - "No"
    mappings:
      - type: from_llm

# ══════════════════════════════════════════════════════════════
#  Global Responses — الـ الردود العامة المشتركة
# ══════════════════════════════════════════════════════════════
responses:
  utter_greet:
    - text: "أهلاً بك في مجموعة العزب. كيف أقدر أساعدك اليوم؟"
      metadata:
        rephrase: true

  utter_goodbye:
    - text: "شكرًا لتواصلك مع مجموعة العزب. نتطلع لخدمتك دائمًا! 🤝"

  utter_thanks:
    - text: "العفو، تحت أمرك في أي وقت."
      metadata:
        rephrase: true

  utter_bot_challenge:
    - text: "أنا مساعد مجموعة العزب الذكي، أساعدك في الاستفسارات وطلبات التواصل."

  utter_out_of_scope:
    - text: "عذراً، هذا السؤال خارج نطاق خدماتنا حالياً. يمكنني مساعدتك في المقاولات، التشطيبات، الهوية التجارية، الصيانة أو التوريدات."

  utter_ask_confirm_human_handoff:
    - text: "هل تريد التحدث مع أحد موظفينا مباشرة؟"
      buttons:
        - title: "✅ نعم"
          payload: "/SetSlots(confirm_human_handoff=Yes)"
        - title: "❌ لا"
          payload: "/SetSlots(confirm_human_handoff=No)"

# ══════════════════════════════════════════════════════════════
#  Session Config
# ══════════════════════════════════════════════════════════════

  utter_lead_submitted:
    - text: |
        ✅ تم استلام بياناتك بنجاح!
        سيتواصل معك أحد مهندسينا خلال 24 ساعة عمل.
        شكراً لاهتمامك بمجموعة العزب. 🤝

  utter_transfer_to_manager:
    - text: |
        👤 يتم تحويلك الآن لأحد ممثلينا.
        ملخص محادثتك: {summary}
        سيتواصل معك الفريق قريباً.

  utter_ask_user_name:
    - text: "ما اسمك الكريم؟"

  utter_ask_user_phone:
    - text: "ما رقم هاتفك؟ حتى يتواصل معك فريقنا."

  utter_ask_user_message:
    - text: "كيف يمكننا مساعدتك؟ اشرح طلبك باختصار."

  utter_ask_location:
    - text: "في أي منطقة أو محافظة تقع؟"

  utter_ask_area_size:
    - text: "ما المساحة التقريبية للمشروع؟ (بالمتر المربع)"

  utter_default_fallback:
    - text: |
        آسف، لم أفهم طلبك جيداً.
        يمكنني مساعدتك في: المقاولات، التشطيب، الهوية التجارية، الصيانة، أو التوريدات.
        أو تحدث مع أحد ممثلينا مباشرة.


  # ── Context Accumulator Slots ──────────────────────────────
  context_memory:
    type: text
    mappings:
      - type: custom

  branch_name:
    type: text
    mappings:
      - type: custom

  location:
    type: text
    mappings:
      - type: custom

  service_type:
    type: text
    mappings:
      - type: custom

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

actions:
  # ── General Actions (action_general.py) ──────────────────
  - action_save_lead_to_crm
  - action_notify_sales_team
  - action_receive_handoff_reason
  - action_check_human_availability
  - action_check_queue_position
  - action_initiate_human_handoff
  - action_wait_for_agent
  - action_transfer_to_agent
  - action_notify_team_via_whatsapp
  - action_collect_escalation_details
  - action_create_escalation_ticket
  - action_notify_manager
  - action_receive_feedback_service
  - action_receive_rating
  - action_receive_feedback_text
  - action_receive_suggestion
  - action_save_feedback
  - action_save_suggestion
  - action_collect_follow_up_contact
  - action_search_faq_by_keyword

  # ── Brand + Form + Submit Actions ──────────────────────
  - action_alazab_get_quote
  - action_alazab_show_projects
  - action_brand_get_quote
  - action_brand_show_industries
  - action_brand_show_process
  - action_human_handoff
  - action_laban_bulk_quote
  - action_laban_check_delivery
  - action_laban_show_catalog
  - action_luxury_get_quote
  - action_luxury_show_materials
  - action_submit_lead
  - action_uberfix_create_request
  - action_uberfix_show_subscriptions
  - action_uberfix_track_request
  - validate_collect_lead_form

  # ── Context Accumulator Actions ────────────────────────────
  - action_accumulate_context
  - action_smart_slot_check
  - action_confirm_understanding
  - action_build_full_request
