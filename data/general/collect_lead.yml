version: "3.1"

flows:
  collect_lead:
    description: "يجمع بيانات التواصل من العميل لطلب عرض سعر أو استفسار عام"
    name: "جمع بيانات العميل"

    steps:
      - id: start
        action: utter_ask_lead_info

      - collect: user_name
        description: "الاسم الكامل للعميل"

      - collect: user_phone
        description: "رقم الهاتف للتواصل"

      - collect: location
        description: "الموقع أو المدينة"

      - collect: service_type
        description: "نوع الخدمة المطلوبة: بناء، تشطيب، هوية، صيانة، توريدات"

      - id: review
        action: utter_ask_lead_confirmation
        next:
          - if: intent = "affirm"
            then: save
          - if: intent = "deny"
            then: restart
          - else: review

      - id: save
        action: action_save_lead_to_crm
        next: notify

      - id: notify
        action: action_notify_sales_team
        next: success

      - id: success
        action: utter_lead_captured
        next: END

      - id: restart
        action: utter_ask_restart_collection
        next:
          - if: intent = "affirm"
            then: start
          - else: END

responses:
  utter_ask_lead_info:
    - text: "يسعدنا جداً اهتمامك بخدماتنا. لضمان تواصل فريق المبيعات معك بأسرع وقت، أحتاج منك بعض البيانات البسيطة."

  utter_ask_lead_confirmation:
    - text: |
        هل هذه البيانات صحيحة؟
        الاسم: {user_name}
        الهاتف: {user_phone}
        الموقع: {location}
        الخدمة: {service_type}

  utter_lead_captured:
    - text: "✅ تم استلام بياناتك بنجاح! سيتواصل معك أحد مهندسينا خلال 24 ساعة عمل."

  utter_ask_restart_collection:
    - text: "هل تريد البدء من جديد لتعديل البيانات؟"