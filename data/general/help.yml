version: "3.1"

flows:
  show_help:
    description: "يعرض خيارات المساعدة وكيفية استخدام البوت"
    nlu_trigger:
      - intent: ask_help
    steps:
      - action: utter_help_menu
        next: END

responses:
  utter_help_menu:
    - text: |
        📚 كيف يمكنني مساعدتك اليوم؟

        يمكنك أن تسألني عن:
        • المقاولات: "عايز ابني عمارة" أو "خدمات البناء"
        • التشطيب: "أسعار التشطيب" أو "معاينة مجانية"
        • الهوية: "تصميم هوية تجارية"
        • الصيانة: "طلب صيانة أوبرفيكس"
        • التوريدات: "خامات بناء وجملة"

        أو فقط أخبرني بما يدور في ذهنك.
