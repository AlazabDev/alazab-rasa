version: "3.1"

nlu:
  - intent: ask_brand_services
    examples: |
      - ايه خدمات Brand Identity
      - بتعملوا هوية بصرية
      - تصميم هوية تجارية
      - تجهيز محلات تجارية
      - تصميم ديكور المحل
      - تنفيذ هوية العلامة
      - تصميم لوجو ومحل
      - تجهيز مساحات تجارية
      - تنفيذ هوية بصرية كاملة
      - تصميم واجهة محل

  - intent: ask_brand_process
    examples: |
      - ازاي بتشتغلوا في البراند
      - ايه خطوات العمل عندكم
      - طريقة تنفيذ الهوية
      - من الفكرة للتنفيذ ازاي
      - عملية تصميم الهوية
      - ايه المراحل اللي بتعملوها

  - intent: ask_brand_portfolio
    examples: |
      - عايز أشوف أعمال Brand Identity
      - نماذج من هويات بصرية عملتوها
      - صور محلات نفذتوها
      - بورتفوليو البراند
      - أعمال سابقة في الهوية التجارية

  - intent: ask_brand_quote
    examples: |
      - عايز عرض سعر هوية بصرية
      - كام تكلفة تجهيز المحل
      - سعر تنفيذ الهوية التجارية
      - تسعير تجهيز مساحة تجارية
      - ابعتلي عرض سعر براند

  - intent: ask_brand_industries
    examples: |
      - بتشتغلوا مع أنهي قطاعات
      - مطاعم وكافيهات
      - صيدليات وعيادات
      - محلات تجارية
      - مكاتب وشركات
      - أنهي أنواع مشاريع بتعملوها

  - intent: ask_brand_shop_fitting
    examples: |
      - تجهيز محلات تجارية
      - تنفيذ ديكور محل
      - تجليد الوجهة بالكلادينج
      - لافتة مضيئة لوجو ABU AUF
      - تصنيع وتوريد وحدات عرض (الجزيرة)
      - وحدة ميزان مجهزة خشب بيتش باين
      - تركيب بورسلين للأرضيات
      - أعمال دهانات GLC 7070 للمحلات
      - تأسيس كهرباء 36 خط وقواطع شنايدر
      - مخارج تكييف وكابلات 3*4 مم
      - ستارة هواء اعلي باب الدخول
      - تجاليد خشب PVC اسود وموسكي
      - تصميم وتنفيذ الوجهة الزجاج
      - نظام إنذار حريق ابوللو للمحلات
      - تجهيز منطقة الباريستا والورمر
      - تسليم محل مفتاح (Fit-out)

  - intent: ask_brand_complete_identity
    examples: |
      - عايز أسس فرع جديد بهويتنا
      - محتاج شركة تستلم المحل على المفتاح بفرشه
      - تنفيذ هوية سلاسل فروع
      - عايز أصمم وأجهز المحل في مكان واحد
      - ابعد عني حيرة التعامل مع شركات كتير
      - استلام المحل جاهز على فرش المنتجات
      - بناء جوهر العلامة التجارية في الفروع
      - توحيد الهوية في كل المحلات
