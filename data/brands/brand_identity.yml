version: "3.1"

flows:
  brand_services:
    description: "لما المستخدم يسأل بالعربي عن تصميم هوية بصرية أو هوية تجارية أو شعار أو خدمات Brand Identity بشكل عام، مثل: أريد تصميم هوية بصرية، محتاج هوية بصرية لشركتي، بتعملوا هوية؟"
    name: "خدمات الهوية البصرية"
    steps:
      - action: utter_brand_services
        next: END

  brand_process:
    description: "لما المستخدم يسأل عن خطوات أو مراحل تصميم وتنفيذ الهوية البصرية من الفكرة حتى التسليم"
    name: "مراحل عمل الهوية البصرية"
    steps:
      - action: action_brand_show_process
        next: END

  brand_portfolio:
    description: "لما المستخدم يطلب مشاهدة أعمال سابقة أو بورتفوليو أو نماذج هويات بصرية وتجهيزات تجارية"
    name: "أعمال سابقة للهوية البصرية"
    steps:
      - action: utter_brand_portfolio
        next: END

  brand_industries:
    description: "لما المستخدم يسأل عن القطاعات والأنشطة التي نخدمها مثل مطاعم وكافيهات وصيدليات ومحلات ومكاتب"
    name: "قطاعات الهوية البصرية"
    steps:
      - action: action_brand_show_industries
        next: END

  brand_get_quote:
    description: "لما المستخدم يطلب سعر أو تكلفة أو عرض سعر أو يريد إرسال بياناته لفريق Brand Identity. لا تستخدمه لمجرد عبارة أريد تصميم هوية بصرية إلا إذا طلب سعراً أو تواصلاً واضحاً"
    name: "طلب عرض سعر للهوية البصرية"
    steps:
      - action: action_brand_get_quote
      - link: collect_lead
