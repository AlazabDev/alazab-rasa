version: "3.1"

rules:
  # ── Global Rules ─────────────────────────────────────
  - rule: رد على التحية
    steps:
      - intent: greet
      - action: utter_greet

  - rule: رد على الوداع
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: رد على الشكر
    steps:
      - intent: thanks
      - action: utter_thanks

  - rule: تحدي البوت
    steps:
      - intent: bot_challenge
      - action: utter_bot_challenge

  - rule: خارج النطاق
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  # ── Alazab Specific Rules ────────────────────────────
  - rule: سؤال عن خدمات Alazab Construction
    steps:
      - intent: ask_alazab_services
      - action: utter_alazab_services

  - rule: سؤال عن مشاريع Alazab
    steps:
      - intent: ask_alazab_projects
      - action: utter_alazab_projects

  - rule: سؤال عن التواصل مع Alazab
    steps:
      - intent: ask_alazab_contact
      - action: utter_alazab_contact

  - rule: سؤال عن Alazab Construction
    steps:
      - intent: ask_alazab_about
      - action: utter_alazab_about
