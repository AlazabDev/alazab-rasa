version: '3.1'
flows:
  alazab_services:
    description: يعرض خدمات Alazab Construction في تنفيذ المشروعات المعمارية السكنية
      والتجارية والخدمية
    name: alazab services
    steps:
    - action: utter_alazab_services
      next: END
  alazab_projects:
    description: يعرض أبرز المشاريع المنجزة والبورتفوليو لشركة Alazab Construction
    name: alazab projects
    steps:
    - action: action_alazab_show_projects
      next: END
  alazab_contact:
    description: يقدم معلومات التواصل مع شركة Alazab Construction مثل الهاتف والواتساب
      والبريد
    name: alazab contact
    steps:
    - action: utter_alazab_contact
      next: END
  alazab_about:
    description: يقدم تعريفًا بشركة Alazab Construction ورسالتها وتاريخها
    name: alazab about
    steps:
    - action: utter_alazab_about
      next: END
  alazab_get_quote:
    description: يطلب عرض سعر أو تسعير لمشروع بناء أو مقاولات من Alazab Construction
    name: alazab get quote
    steps:
    - action: action_alazab_get_quote
    - link: collect_lead
  uberfix_services:
    description: يعرض خدمات UberFix في الصيانة الذكية
    name: uberfix services
    steps:
    - action: utter_uberfix_services
      next: END
  uberfix_request:
    description: 'يسجل طلب صيانة جديد عبر UberFix. يستوعب أن المستخدم قد يذكر الموقع
      والمشكلة في رسائل مختلفة، ويربط السياق تلقائياً دون أن يطلب تكرار المعلومات.

      '
    name: uberfix request maintenance
    steps:
    - action: action_accumulate_context
    - collect: user_name
      description: 'اسم العميل أو الشركة صاحبة الطلب. إذا كان ذُكر مسبقاً في المحادثة،
        لا تسأل مجدداً.

        '
      ask_before_filling: false
      reset_after_flow_ends: false
    - collect: user_phone
      description: 'رقم هاتف للتواصل. قبل السؤال تحقق من context_memory.

        '
      ask_before_filling: false
      reset_after_flow_ends: false
    - action: action_build_full_request
    - collect: user_message
      description: 'وصف العطل أو طلب الصيانة بالتفصيل. يجمع من كل رسائل المستخدم:
        الموقع + المشكلة + الفرع. إذا قال "التكيف عطلان في الفرع" بعد ذكر الفرع سابقاً،
        فالفرع السابق يُضاف تلقائياً للوصف.

        '
      ask_before_filling: false
      reset_after_flow_ends: false
    - action: action_confirm_understanding
    - action: action_uberfix_create_request
      next: END
  uberfix_track:
    description: يتتبع حالة طلب صيانة قائم
    name: uberfix track request
    steps:
    - action: action_accumulate_context
    - action: action_uberfix_track_request
      next: END
  uberfix_subscriptions:
    description: يعرض باقات الاشتراك السنوية
    name: uberfix subscriptions
    steps:
    - action: action_uberfix_show_subscriptions
      next: END
  uberfix_emergency:
    description: حالة طوارئ — توجيه للتواصل الفوري
    name: uberfix emergency
    steps:
    - action: action_accumulate_context
    - collect: user_name
      ask_before_filling: false
      reset_after_flow_ends: false
    - collect: user_phone
      ask_before_filling: false
      reset_after_flow_ends: false
    - action: action_build_full_request
    - collect: user_message
      ask_before_filling: false
      reset_after_flow_ends: false
    - action: action_uberfix_create_request
      next: END
  luxury_services:
    description: يعرض خدمات Luxury Finishing في التشطيبات الراقية للوحدات السكنية
      والتجارية
    name: luxury services
    steps:
    - action: utter_luxury_services
      next: END
  luxury_materials:
    description: يعرض الخامات والمواد الفاخرة التي تستخدمها Luxury Finishing مثل الرخام
      والبورسلان والخشب والدهانات
    name: luxury materials
    steps:
    - action: action_luxury_show_materials
      next: END
  luxury_portfolio:
    description: يعرض أعمال وبورتفوليو Luxury Finishing للاطلاع على نماذج التشطيبات
    name: luxury portfolio
    steps:
