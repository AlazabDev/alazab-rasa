version: "3.1"

flows:
  pattern_cannot_handle:
    description: "يتم استدعاؤه عندما لا يفهم البوت طلب المستخدم أو يخرج عن النطاق"
    steps:
      - action: utter_out_of_scope
        next: END

  pattern_completed:
    description: "إشعار عند اكتمال المهمة بنجاح"
    name: "pattern completed"
    steps:
      - noop: true
        next: END

  pattern_correction:
    description: "يسمح للمستخدم بتصحيح أي معلومة أخطأ فيها مثل رقم الهاتف أو الاسم"
    name: "تصحيح المعلومات"
    steps:
      - action: action_correct_flow_slot
        next: END

  pattern_session_start:
    description: "بداية الجلسة والترحيب"
    name: "بداية المحادثة"
    nlu_trigger:
      - intent: session_start
    steps:
      - action: utter_greet
        next: END

  pattern_cancel_flow:
    description: "يسمح للمستخدم بإلغاء الطلب الحالي أو الخروج من المسار"
    name: "إلغاء العملية"
    steps:
      - action: utter_confirm_cancel
        next:
          - if: intent = "affirm"
            then: END
          - else: RESUME
