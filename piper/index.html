<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض أصوات Piper - مجموعة العزب</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d6a318;
            --primary-dark: #b88a10;
            --bg-dark: #0f1115;
            --card-bg: #1a1d23;
            --text-light: #f8f9fa;
            --text-muted: #a0aec0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e222a 0%, #0f1115 100%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 600;
            margin-right: 5px;
        }

        select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(214, 163, 24, 0.2);
        }

        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .audio-player-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        audio {
            width: 100%;
            height: 45px;
            border-radius: 10px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        .meta-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .text-preview {
            background: rgba(214, 163, 24, 0.05);
            border-right: 4px solid var(--primary);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .model-card {
            font-family: 'Outfit', sans-serif;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--glass);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        #key {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--primary);
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 768px) {
            .meta-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>مستعرض أصوات Piper</h1>
            <p class="subtitle">تجربة واختبار نماذج تحويل النص إلى كلام (TTS) محلياً</p>
        </header>

        <section class="control-panel">
            <div class="form-group">
                <label for="languages">اللغة</label>
                <select id="languages" onchange="setLanguage()">
                    <option value="">اختر اللغة...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="voice">الصوت</label>
                <select id="voice" onchange="setVoice()">
                    <option value="">اختر الصوت...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quality">الجودة</label>
                <select id="quality" onchange="setQuality()">
                    <option value="">اختر الجودة...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="speaker">المتحدث</label>
                <select id="speaker" onchange="setSpeaker()">
                    <option value="">الافتراضي</option>
                </select>
            </div>
        </section>

        <section id="info" class="info-card" hidden>
            <div class="audio-player-container">
                <audio id="audio" controls autoplay></audio>
            </div>

            <div class="meta-info">
                <div>
                    <h3>النص النموذجي</h3>
                    <div id="text" class="text-preview"></div>
                    
                    <div class="actions">
                        <a id="download" class="btn btn-primary" href="#" target="_blank">
                            <span>تحميل النموذج</span>
                        </a>
                        <div class="btn btn-secondary">
                            <span>المعرف:</span>
                            <span id="key"></span>
                        </div>
                    </div>
                </div>
                <div>
                    <h3>بطاقة النموذج (Model Card)</h3>
                    <div id="modelCard" class="model-card"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
