version: "1.0"
purpose: "Arabic pronunciation and brand wording guide for Alazab voice/TTS outputs."

rules:
  - id: protect_brand_name
    description: "لا تُنطق كلمة العزب ككلمة عامة. تُكتب صوتياً بصيغة تفصل آل عن عزب."
    match:
      - "العزب"
      - "الأعزب"
      - "الاعزب"
      - "Alazab"
      - "AlaZab"
    say_as: "آلْ عَزَب"

  - id: prefer_diacritized_company_name
    description: "الصيغة الرسمية المنطوقة عند ذكر المؤسسة."
    match:
      - "مؤسسة العزب للهندسة المعمارية"
      - "مؤسسة الأعزب للهندسة المعمارية"
    say_as: "مُؤَسَّسَةُ آلْ عَزَب لِلْهَنْدَسَةِ الْمِعْمَارِيَّة"

  - id: bot_name
    description: "اسم البوت عند التعريف بنفسه."
    match:
      - "بوت العزب"
      - "بوت الأعزب"
      - "عزبوت"
    say_as: "بوتْ آلْ عَزَب"

  - id: alazab_group
    description: "المنظومة الأم لمجموعة العزب."
    match:
      - "Alazab Group"
      - "مجموعة العزب"
      - "مجموعة الأعزب"
    say_as: "مَجْمُوعَةُ آلْ عَزَب"

  - id: luxury_finishing
    description: "علامة التشطيبات الراقية."
    match:
      - "Luxury Finishing"
      - "لاكشري فينيشينج"
      - "لاكشري فينشينج"
    say_as: "لاكْشَرِي فِينِشِنْج"

  - id: brand_identity
    description: "علامة الهوية التجارية."
    match:
      - "Brand Identity"
      - "براند ايدنتيتي"
      - "براند آيدنتيتي"
    say_as: "بِرَانْد آيْدِنْتِتِي"

  - id: uberfix
    description: "منصة الصيانة والتشغيل."
    match:
      - "UberFix"
      - "Uberfix"
      - "أوبرفكس"
      - "أوبر فيكس"
    say_as: "أُوبَر فِكْس"

  - id: laban_alasfour
    description: "علامة توريد الخامات والمنتجات للمشروعات المعمارية."
    match:
      - "Laban Alasfour"
      - "لبن العصفور"
      - "ألبان العصفور"
    say_as: "لَبَن الْعُصْفُور"

brand_terms:
  - written: "العزب"
    preferred_spoken: "آلْ عَزَب"
    notes: "فصل اللام عن عزب يمنع النطق الخاطئ."

  - written: "مجموعة العزب"
    preferred_spoken: "مَجْمُوعَةُ آلْ عَزَب"

  - written: "Alazab Group"
    preferred_spoken: "مَجْمُوعَةُ آلْ عَزَب"

  - written: "مؤسسة العزب للهندسة المعمارية"
    preferred_spoken: "مُؤَسَّسَةُ آلْ عَزَب لِلْهَنْدَسَةِ الْمِعْمَارِيَّة"

  - written: "AzaBot"
    preferred_spoken: "عَزَبوت"

  - written: "Alazab Construction"
    preferred_spoken: "آلْ عَزَب كُنْسْتْرَكْشِن"

  - written: "Luxury Finishing"
    preferred_spoken: "لاكْشَرِي فِينِشِنْج"

  - written: "Brand Identity"
    preferred_spoken: "بِرَانْد آيْدِنْتِتِي"

  - written: "UberFix"
    preferred_spoken: "أُوبَر فِكْس"

  - written: "Laban Alasfour"
    preferred_spoken: "لَبَن الْعُصْفُور"

