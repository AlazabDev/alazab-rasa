  - written: "الهندسة المعمارية"
    preferred_spoken: "الْهَنْدَسَةُ الْمِعْمَارِيَّة"

  - written: "التصميم المعماري"
    preferred_spoken: "التَّصْمِيمُ الْمِعْمَارِي"

  - written: "التشطيبات"
    preferred_spoken: "التَّشْطِيبَات"

  - written: "المقاولات"
    preferred_spoken: "الْمُقَاوَلَات"

  - written: "الديكور الداخلي"
    preferred_spoken: "الدِّيكُورُ الدَّاخِلِي"

  - written: "الهوية البصرية"
    preferred_spoken: "الْهُوِيَّةُ الْبَصَرِيَّة"

  - written: "عرض سعر"
    preferred_spoken: "عَرْضُ سِعْر"

  - written: "استشارة معمارية"
    preferred_spoken: "اِسْتِشَارَةٌ مِعْمَارِيَّة"

  - written: "التنفيذ المعماري"
    preferred_spoken: "التَّنْفِيذُ الْمِعْمَارِي"

  - written: "التشطيبات الداخلية الراقية"
    preferred_spoken: "التَّشْطِيبَاتُ الدَّاخِلِيَّةُ الرَّاقِيَة"

