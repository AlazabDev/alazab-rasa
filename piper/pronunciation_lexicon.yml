  - written: "المشروعات المعمارية"
    preferred_spoken: "الْمَشْرُوعَاتُ الْمِعْمَارِيَّة"

standard_voice_lines:
  greeting_alazab_architecture:
    plain: "مرحباً بعميلنا العزيز، شكراً لاتصالكم بمؤسسة العزب للهندسة المعمارية. أنا بوت العزب، وأنا هنا لمساعدتكم اليوم. كيف يمكنني مساعدتكم في تلبية احتياجاتكم المعمارية أو طلباتكم الحالية؟"
    tts: "مَرْحَبًا بِعَمِيلِنَا الْعَزِيز، شُكْرًا لِاتِّصَالِكُمْ بِمُؤَسَّسَةِ آلْ عَزَب لِلْهَنْدَسَةِ الْمِعْمَارِيَّة. أَنَا بوتْ آلْ عَزَب، وَأَنَا هُنَا لِمُسَاعَدَتِكُمُ الْيَوْم. كَيْفَ يُمْكِنُنِي مُسَاعَدَتُكُمْ فِي تَلْبِيَةِ اِحْتِيَاجَاتِكُمُ الْمِعْمَارِيَّة أَوْ طَلَبَاتِكُمُ الْحَالِيَّة؟"

  short_greeting:
    plain: "مرحباً، أنا بوت العزب. كيف أقدر أساعدك اليوم؟"
    tts: "مَرْحَبًا، أَنَا بوتْ آلْ عَزَب. كَيْفَ أَقْدِرْ أُسَاعِدَكِ الْيَوْم؟"

  group_intro:
    plain: "مجموعة العزب تجمع خدمات التنفيذ المعماري، التشطيبات الراقية، تصميم الهوية التجارية، وإدارة الصيانة والتشغيل في منظومة واحدة."
    tts: "مَجْمُوعَةُ آلْ عَزَب تَجْمَعُ خَدَمَاتِ التَّنْفِيذِ الْمِعْمَارِي، وَالتَّشْطِيبَاتِ الرَّاقِيَة، وَتَصْمِيمِ الْهُوِيَّةِ التِّجَارِيَّة، وَإِدَارَةِ الصِّيَانَةِ وَالتَّشْغِيل، فِي مَنْظُومَةٍ وَاحِدَة."

  uberfix_request:
    plain: "يمكنك تقديم طلب صيانة مباشر من خلال منصة UberFix."
    tts: "يُمْكِنُكَ تَقْدِيمُ طَلَبِ صِيَانَةٍ مُبَاشِر مِنْ خِلَالِ مَنْصَّةِ أُوبَر فِكْس."

normalization_notes:
  - "أي رد صوتي يحتوي على العزب أو الأعزب يجب تحويله قبل TTS إلى آلْ عَزَب."
  - "الجمل الرسمية الطويلة يفضل إرسالها لـ TTS بالتشكيل الكامل لتقليل أخطاء النطق."
  - "لا تستخدم التشكيل داخل NLU training بكثافة إلا كأمثلة إضافية، لأن الغرض هنا إخراج صوتي لا فهم نوايا."
  - "عند الحاجة للتوقف الصوتي القصير استخدم فاصلة عربية أو نقطة، وليس مسافات كثيرة."
