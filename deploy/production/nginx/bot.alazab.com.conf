# ══════════════════════════════════════════════════════════════
#  Nginx Production Config — bot.alazab.com
#  AzaBot / Alazab Group Chatbot
#  Nginx → FastAPI Webhook (port 8000)
# ══════════════════════════════════════════════════════════════

limit_req_zone  $binary_remote_addr  zone=chat_api:20m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=admin_api:10m  rate=20r/m;
limit_req_zone  $binary_remote_addr  zone=uploads:10m    rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=global:20m     rate=120r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name bot.alazab.com www.bot.alazab.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.alazab.com www.bot.alazab.com;

    ssl_certificate      /etc/letsencrypt/live/bot.alazab.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/bot.alazab.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bot.alazab.com/chain.pem;
    ssl_session_cache    shared:SSL:20m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             8.8.8.8 8.8.4.4 valid=300s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-XSS-Protection          "1; mode=block"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "microphone=(self), camera=()"          always;

    gzip on; gzip_vary on; gzip_comp_level 5; gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;

    limit_conn conn_limit 20;
    client_max_body_size 15M;
    set $upstream http://127.0.0.1:8000;

    location = /health {
        access_log off;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    location ~ ^/chat(/|$) {
        limit_req zone=chat_api burst=15 nodelay;
        limit_req_status 429;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 90s;
        proxy_send_timeout 30s;
    }

    location ~ ^/chat/(upload|audio)$ {
        limit_req zone=uploads burst=5 nodelay;
        client_max_body_size 15M;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location ~ ^/admin(/|$) {
        limit_req zone=admin_api burst=10 nodelay;
        limit_req_status 429;
        # allow 158.101.231.62;  # uncomment to restrict admin by IP
        # deny all;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    location = /uberfix/bot-gateway {
        limit_req zone=chat_api burst=10 nodelay;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    location ~ ^/webhook/(meta|telegram)$ {
        limit_req zone=global burst=50 nodelay;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 15s;
    }

    location ~ ^/(embed|piper)/ {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        access_log off;
    }

    location /assets/ {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        limit_req zone=global burst=100 nodelay;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    access_log /var/log/nginx/bot_alazab_access.log;
    error_log  /var/log/nginx/bot_alazab_error.log warn;
}
