# ══════════════════════════════════════════════════════════════
#  Nginx — bot.alazab.com | AzaBot v3 Production
#  Architecture:
#    HTTPS → Nginx → FastAPI :8000 (API + SPA fallback)
#    Static assets (dist/) served by Nginx directly
# ══════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=chat:20m     rate=30r/m;
limit_req_zone  $binary_remote_addr zone=admin:10m    rate=20r/m;
limit_req_zone  $binary_remote_addr zone=upload:5m    rate=10r/m;
limit_req_zone  $binary_remote_addr zone=webhook:10m  rate=120r/m;
limit_req_zone  $binary_remote_addr zone=global:30m   rate=200r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP → HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bot.alazab.com www.bot.alazab.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / { return 301 https://bot.alazab.com$request_uri; }
}

# ── HTTPS Main ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.alazab.com www.bot.alazab.com;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/bot.alazab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.alazab.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bot.alazab.com/chain.pem;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 1.1.1.1 valid=300s;

    # ── Security Headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "microphone=(self), camera=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss:; font-src 'self' data:; media-src 'self' blob:;" always;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on; gzip_vary on; gzip_comp_level 6; gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript
               image/svg+xml application/wasm application/manifest+json;

    # ── Limits ────────────────────────────────────────────────
    limit_conn perip 25;
    client_max_body_size 16M;
    client_body_timeout  30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Paths ─────────────────────────────────────────────────
    set $api        http://127.0.0.1:8000;
    set $dist_root  /opt/azabot/azabot/dist;

    # ── Health (no log, low timeout) ─────────────────────────
    location = /health {
        access_log off;
        proxy_pass $api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    # ── API: Chat ─────────────────────────────────────────────
    location ~ ^/chat(/|$) {
        limit_req zone=chat burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Original-URI    $request_uri;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 90s;
    }

    # ── API: File/Audio upload ────────────────────────────────
    location ~ ^/chat/(upload|audio)$ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 16M;

        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # ── API: Admin ────────────────────────────────────────────
    location ~ ^/admin(/|$) {
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;

        # قيّد الوصول لـ admin بـ IP في الإنتاج:
        # allow YOUR_SERVER_IP;
        # deny  all;

        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # ── API: Brands list ──────────────────────────────────────
    location = /brands {
        limit_req zone=global burst=30 nodelay;
        proxy_pass $api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1m;
    }

    # ── API: UberFix Bot Gateway ──────────────────────────────
    location = /uberfix/bot-gateway {
        limit_req zone=chat burst=10 nodelay;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API: Meta / Telegram Webhooks ─────────────────────────
    location ~ ^/webhook/(meta|telegram)$ {
        limit_req zone=webhook burst=60 nodelay;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # ── API: Lead endpoint ────────────────────────────────────
    location = /lead {
        limit_req zone=chat burst=10 nodelay;
        proxy_pass $api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Piper TTS static ──────────────────────────────────────
    location ~ ^/piper/ {
        proxy_pass $api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ── Embed script ──────────────────────────────────────────
    location ~ ^/embed/ {
        root $dist_root;
        try_files $uri $uri/ @api;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── React SPA static assets (immutable) ───────────────────
    location /assets/ {
        root $dist_root;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Public static files ───────────────────────────────────
    location ~ \.(ico|png|svg|webmanifest|txt|xml|woff2?|ttf|eot)$ {
        root $dist_root;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── API Docs (اختياري — أوقفه في الإنتاج) ─────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        # أزل التعليق لإتاحة الـ docs:
        # proxy_pass $api;
        return 404;
    }

    # ── React SPA — كل المسارات الأخرى ───────────────────────
    location / {
        root $dist_root;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";

        # منع index.html من الـ caching
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires off;
        }
    }

    # ── Fallback لـ API إذا لم يكن الملف في dist ──────────────
    location @api {
        proxy_pass $api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/bot_alazab_access.log;
    error_log  /var/log/nginx/bot_alazab_error.log warn;
}
