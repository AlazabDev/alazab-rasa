# ══════════════════════════════════════════════════════════════
#  /etc/nginx/nginx.conf — مُحسَّن لـ 2 vCPU
#  انسخه إلى: /etc/nginx/nginx.conf
# ══════════════════════════════════════════════════════════════

user www-data;

# 2 vCPU → 2 workers
worker_processes 2;
worker_cpu_affinity auto;

error_log /var/log/nginx/error.log warn;
pid       /run/nginx.pid;

events {
    # 2 vCPU × 768 = 1536 اتصال متزامن كافٍ لـ chatbot
    worker_connections 768;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" ${request_time}s';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # ── Timeouts مناسبة لـ Rasa (بطيء أحياناً) ───────────────
    keepalive_timeout  65;
    keepalive_requests 100;
    client_body_timeout 30;
    client_header_timeout 10;
    send_timeout 30;

    # ── Buffers ────────────────────────────────────────────────
    client_max_body_size     16M;
    client_body_buffer_size  128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ── Proxy buffers ──────────────────────────────────────────
    proxy_buffering          on;
    proxy_buffer_size        8k;
    proxy_buffers            8 16k;
    proxy_busy_buffers_size  32k;
    proxy_connect_timeout    10s;
    proxy_send_timeout       30s;
    proxy_read_timeout       90s;

    # ── Gzip ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css application/json application/javascript
        text/javascript image/svg+xml application/wasm
        application/manifest+json;

    # ── Security ──────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Open file cache ────────────────────────────────────────
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*.conf;
}
