version: "3.1"
flows:
  # ── عرض خدمات UberFix ─────────────────────────────────────
  uberfix_services:
    description: "يعرض خدمات UberFix في الصيانة الذكية"
    name: "uberfix services"
    steps:
      - action: utter_uberfix_services
        next: END
  # ── طلب صيانة جديد مع الذاكرة السياقية ───────────────────
  uberfix_request:
    description: >
      يسجل طلب صيانة جديد عبر UberFix.
      يستوعب أن المستخدم قد يذكر الموقع والمشكلة في رسائل مختلفة،
      ويربط السياق تلقائياً دون أن يطلب تكرار المعلومات.
    name: "uberfix request maintenance"
    steps:
      # الخطوة 0: تجميع كل السياق من المحادثة أولاً
      - action: action_accumulate_context
      # الخطوة 1: جلب الاسم (إذا لم يُستخرج من السياق)
      - collect: user_name
        description: >
          اسم العميل أو الشركة صاحبة الطلب.
          إذا كان ذُكر مسبقاً في المحادثة، لا تسأل مجدداً.
        ask_before_filling: false
        reset_after_flow_ends: false
      # الخطوة 2: جلب الهاتف
      - collect: user_phone
        description: >
          رقم هاتف للتواصل.
          قبل السؤال تحقق من context_memory.
        ask_before_filling: false
        reset_after_flow_ends: false
      # الخطوة 3: بناء user_message الكامل من السياق المتراكم
      - action: action_build_full_request
      # الخطوة 4: جلب وصف المشكلة (إذا لم يُبنَ من السياق)
      - collect: user_message
        description: >
          وصف العطل أو طلب الصيانة بالتفصيل.
          يجمع من كل رسائل المستخدم: الموقع + المشكلة + الفرع.
          إذا قال "التكيف عطلان في الفرع" بعد ذكر الفرع سابقاً،
          فالفرع السابق يُضاف تلقائياً للوصف.
        ask_before_filling: false
        reset_after_flow_ends: false
      # الخطوة 5: تأكيد الفهم قبل الإرسال
      - action: action_confirm_understanding
      # الخطوة 6: إرسال الطلب
      - action: action_uberfix_create_request
        next: END
  # ── تتبع طلب ─────────────────────────────────────────────
  uberfix_track:
    description: "يتتبع حالة طلب صيانة قائم"
    name: "uberfix track request"
    steps:
      - action: action_accumulate_context
      - action: action_uberfix_track_request
        next: END
  # ── الباقات ──────────────────────────────────────────────
  uberfix_subscriptions:
    description: "يعرض باقات الاشتراك السنوية"
    name: "uberfix subscriptions"
    steps:
      - action: action_uberfix_show_subscriptions
        next: END
  # ── طوارئ ─────────────────────────────────────────────────
  uberfix_emergency:
    description: "حالة طوارئ — توجيه للتواصل الفوري"
    name: "uberfix emergency"
    steps:
      - action: action_accumulate_context
      - collect: user_name
        ask_before_filling: false
        reset_after_flow_ends: false
      - collect: user_phone
        ask_before_filling: false
        reset_after_flow_ends: false
      - action: action_build_full_request
      - collect: user_message
        ask_before_filling: false
        reset_after_flow_ends: false
      - action: action_uberfix_create_request
        next: END
