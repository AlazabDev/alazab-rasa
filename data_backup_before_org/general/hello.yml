version: "3.1"
flows:
  hello:
    description: "الترحيب العام بالمستخدم"
    nlu_trigger:
      - intent: greet
    steps:
      - action: utter_greet
  hello_goodbye:
    description: "توديع المستخدم من سياق الترحيب"
    nlu_trigger:
      - intent: goodbye
    steps:
      - action: utter_goodbye