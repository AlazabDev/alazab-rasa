version: "3.1"
# ══════════════════════════════════════════════════════════════
#  data/system/patterns/patterns.yml
#  CALM System Patterns — Rasa Pro built-in flows
#  ملاحظة: action_correct_flow_slot و session_start
#  هي أدوات مدمجة في Rasa Pro CALM ولا تحتاج تنفيذاً مخصصاً.
# ══════════════════════════════════════════════════════════════
flows:
  pattern_cannot_handle:
    description: "يتم استدعاؤه عندما لا يجد البوت إجابة مناسبة في قاعدة المعرفة أو الخدمات"
    steps:
      - action: utter_no_relevant_answer_found
        next: END
  pattern_completed:
    description: "إشعار عند اكتمال المهمة بنجاح"
    name: "pattern completed"
    steps:
      - noop: true
        next: END
  pattern_correction:
    description: "يسمح للمستخدم بتصحيح معلومة أخطأ فيها"
    name: "تصحيح المعلومات"
    steps:
      - action: action_correct_flow_slot
        next: END
  pattern_search:
    name: "البحث في قاعدة المعرفة"
    description: "يتم استدعاؤه عند طرح سؤال معرفي يتطلب البحث في البيانات"
    steps:
      - action: action_trigger_search
        next: END
  pattern_clarification:
    description: "يُستخدم عندما يكون طلب المستخدم محتملاً لأكثر من مسار"
    name: "توضيح الطلب"
    steps:
      - noop: true
        next:
          - if: context.names
            then: action_clarify_flows
          - else:
            - action: utter_clarification_no_options_rasa
              next: END
      - id: action_clarify_flows
        action: action_clarify_flows
      - action: utter_clarification_options_rasa
  pattern_session_start:
    description: "بداية الجلسة والترحيب بالمستخدم"
    name: "بداية المحادثة"
    steps:
      - action: utter_greet
        next: END
  pattern_cancel_flow:
    description: "يسمح للمستخدم بإلغاء الطلب الحالي"
    name: "إلغاء العملية"
    steps:
      - action: utter_confirm_cancel
        next:
          - if: context.intent.name = "affirm"
            then: END
          - else: END
