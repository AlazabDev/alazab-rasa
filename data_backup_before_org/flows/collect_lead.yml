version: "3.1"
flows:
  collect_lead:
    description: >
      جمع بيانات العميل المحتمل (lead) لأي براند.
      يستوعب أن المستخدم قد يذكر معلوماته في رسائل مختلفة
      ويبني صورة كاملة تلقائياً دون تكرار الأسئلة.
    name: "collect lead"
    steps:
      # تجميع السياق أولاً من كامل المحادثة
      - action: action_accumulate_context
      # الاسم (يُملأ تلقائياً من السياق إذا ذُكر)
      - collect: user_name
        description: >
          اسم العميل. إذا ذُكر في أي رسالة سابقة لا تسأل مجدداً.
        ask_before_filling: false
        reset_after_flow_ends: false
      # الهاتف
      - collect: user_phone
        description: >
          رقم هاتف التواصل. إذا ذُكر سابقاً لا تسأل.
        ask_before_filling: false
        reset_after_flow_ends: false
      # بناء طلب شامل من السياق
      - action: action_build_full_request
      # الطلب التفصيلي
      - collect: user_message
        description: >
          وصف الطلب أو الخدمة المطلوبة.
          يجمع تلقائياً من كل ما قاله المستخدم.
        ask_before_filling: false
        reset_after_flow_ends: false
      # إرسال
      - action: action_submit_lead
        next: END
