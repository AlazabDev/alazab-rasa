# ============================================================
#  credentials.yml — Alazab Group Chatbot Production
# ============================================================

rest:

socketio:
  user_message_evt:    user_uttered
  bot_message_evt:     bot_uttered
  session_persistence: true

# ── WhatsApp (Meta Cloud API) ─────────────────────────────────
facebook:
  verify: "${FB_VERIFY_TOKEN}"
  secret: "${FB_APP_SECRET}"
  page_access_token: "${FB_PAGE_ACCESS_TOKEN}"

# ── Telegram ──────────────────────────────────────────────────
telegram:
  access_token: "${TELEGRAM_TOKEN}"
  verify: "${TELEGRAM_BOT_NAME}"
  webhook_url: "${PUBLIC_BASE_URL}/webhooks/telegram/webhook"
