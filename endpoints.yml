action_endpoint:
  url: "${ACTION_SERVER_URL:http://127.0.0.1:5055/webhook}"

tracker_store:
  type: redis
  url: "${REDIS_HOST:127.0.0.1}"
  port: ${REDIS_PORT:6379}
  db: ${REDIS_DB:0}
  password: "${REDIS_PASSWORD:}"
  key_prefix: "${REDIS_KEY_PREFIX:alazab}"
  use_ssl: ${REDIS_USE_SSL:false}

lock_store:
  type: redis
  url: "${REDIS_HOST:127.0.0.1}"
  port: ${REDIS_PORT:6379}
  db: ${REDIS_LOCK_DB:1}
  password: "${REDIS_PASSWORD:}"
  use_ssl: ${REDIS_USE_SSL:false}

model_groups:
  - id: openai-gpt-4o
    models:
      - provider: openai
        model: gpt-4o
        timeout: 20
  - id: openai-gpt-4o-mini
    models:
      - provider: openai
        model: gpt-4o-mini
        timeout: 20
  - id: openai-embeddings
    models:
      - provider: openai
        model: text-embedding-3-large
