action_endpoint:
  url: "${ACTION_SERVER_URL:-http://127.0.0.1:5055/webhook}"

tracker_store:
  type: redis
  url: "${REDIS_URL:-127.0.0.1}"
  port: "${REDIS_PORT:-6379}"
  db: "${REDIS_DB:-0}"
  password: "${REDIS_PASSWORD:-}"
  key_prefix: "${REDIS_KEY_PREFIX:-alazab}"

lock_store:
  type: redis
  url: "${REDIS_LOCK_URL:-127.0.0.1}"
  port: "${REDIS_LOCK_PORT:-6379}"
  db: "${REDIS_LOCK_DB:-1}"
  password: "${REDIS_LOCK_PASSWORD:-${REDIS_PASSWORD:-}}"
