# ============================================================
#  docker-compose.prod.yaml — بيئة الإنتاج
#  مجموعة العزب | Alazab Group Chatbot
#
#  الاستخدام:
#    docker compose --env-file .env -f docker/docker-compose.prod.yaml up -d --build
# ============================================================

services:
  # ── Rasa Pro (CALM) ──────────────────────────────────────
  rasa:
    image: ${RASA_PRO_IMAGE:-rasa/rasa-pro:3.15.8}
    expose:
      - "5005"
    volumes:
      - ../models:/app/models:ro
      - ../config.yml:/app/config.yml:ro
      - ../domain.yml:/app/domain.yml:ro
      - ../domain:/app/domain:ro
      - ../data:/app/data:ro
      - ../endpoints.yml:/app/endpoints.yml:ro
      - ../credentials.yml:/app/credentials.yml:ro
      - ../docs:/app/docs:ro
    environment:
      - RASA_PRO_LICENSE=__REMOVED_FROM_GIT_HISTORY__
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG_ID=${OPENAI_ORG_ID:-}
      - REDIS_URL=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_KEY_PREFIX=alazab
      - REDIS_LOCK_URL=${REDIS_HOST:-redis}
      - REDIS_LOCK_PORT=${REDIS_PORT:-6379}
      - REDIS_LOCK_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_LOCK_DB=1
      - ACTION_SERVER_URL=http://action-server:5055/webhook
    command: >
      run
      --enable-api
      --cors "*"
      --endpoints /app/endpoints.yml
      --credentials /app/credentials.yml
    depends_on:
      action-server:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Action Server ────────────────────────────────────────
  action-server:
    image: ${RASA_PRO_IMAGE:-rasa/rasa-pro:3.15.8}
    expose:
      - "5055"
    volumes:
      - ../actions:/app/actions:ro
      - ../knowledge_base:/app/knowledge_base:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - NOTIFY_PHONE=${NOTIFY_PHONE:-}
      - WEBHOOK_NOTIFY_URL=${WEBHOOK_NOTIFY_URL:-}
    command: ["run", "actions", "--actions", "actions"]
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Webhook Server (FastAPI) ─────────────────────────────
  webhook:
    build:
      context: ..
      dockerfile: docker/Dockerfile.webhook
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - RASA_URL=http://rasa:5005
      - ACTION_SERVER_URL=http://action-server:5055/webhook
    volumes:
      - webhook-uploads:/app/webhook/static/uploads
      - admin-data:/app/.runtime
    depends_on:
      rasa:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/${PUBLIC_DOMAIN:-chat.alazab.com}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/${PUBLIC_DOMAIN:-chat.alazab.com}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      webhook:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  webhook-uploads:
  admin-data:
