# ============================================================
#  docker-compose.yaml — بيئة التطوير المحلية
#  مجموعة العزب | Alazab Group Chatbot
#
#  الاستخدام:
#    docker compose --env-file .env -f docker/docker-compose.yaml up -d --build
# ============================================================

services:
  # ── Rasa Pro (CALM) ──────────────────────────────────────
  rasa:
    image: ${RASA_PRO_IMAGE:-rasa/rasa-pro:3.15.8}
    ports:
      - "5005:5005"
    volumes:
      - ..:/app
    environment:
      - RASA_PRO_LICENSE=__REMOVED_FROM_GIT_HISTORY__
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG_ID=${OPENAI_ORG_ID:-}
    command: >
      run
      --enable-api
      --cors "*"
      --endpoints /app/endpoints.yml
      --credentials /app/credentials.yml
    depends_on:
      action-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Action Server ────────────────────────────────────────
  action-server:
    image: ${RASA_PRO_IMAGE:-rasa/rasa-pro:3.15.8}
    ports:
      - "5055:5055"
    volumes:
      - ..:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - NOTIFY_PHONE=${NOTIFY_PHONE:-}
      - WEBHOOK_NOTIFY_URL=${WEBHOOK_NOTIFY_URL:-}
    command: ["run", "actions", "--actions", "actions"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Webhook Server (FastAPI) ─────────────────────────────
  webhook:
    build:
      context: ..
      dockerfile: docker/Dockerfile.webhook
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../webhook:/app/webhook
      - ../actions:/app/actions
      - webhook-uploads:/app/webhook/static/uploads
    depends_on:
      rasa:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis (Tracker Store + Lock Store) ───────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
  webhook-uploads:
