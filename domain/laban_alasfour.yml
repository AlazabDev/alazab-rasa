  utter_laban_production_001:
    - text: |
        Laban Alasfour / سياق إنتاج عام: اسبوت حربيه.
        المخاطَب المتوقع: عميل جديد؛ الرد يثبت الفهم ولا يبالغ. (سياق إنتاج عام #001)
        اسأل عن المكان، سبب الطلب، درجة الاستعجال، ووقت المعاينة المناسب. (سياق إنتاج عام #001)
        لو ظهر خطر أو تعطل فرع، تُرفع الأولوية فورًا للفريق. (سياق إنتاج عام #001)
        ملاحظة جودة: يحفظ البند كلغة إنتاج لا كجملة عامة. (سياق إنتاج عام #001)
        يُنقل للفريق: البند، الموقع، الأولوية، والمرفقات. (سياق إنتاج عام #001)

  utter_laban_production_002:
    - text: |
        بند إنتاج داخل Laban Alasfour: اعمال الدهانات سافيتو.
        لا يُعامل كنص دعائي؛ هو بند تشغيل يحتاج بيانات حاسمة. (الدهانات والترميمات #002)
        حدد هل المطلوب إصلاح مؤقت، استبدال، أم تنفيذ نهائي. (الدهانات والترميمات #002)
        الخطوة التالية: تسجيل الطلب وتحويله بعد اكتمال المعلومة الناقصة. (الدهانات والترميمات #002)
        ملاحظة جودة: حالة السطح أهم من اختيار اللون فقط. (الدهانات والترميمات #002)
        يُحافظ الرد على نبرة العزب: راقية، مختصرة، وحاسمة. (الدهانات والترميمات #002)

  utter_laban_production_003:
    - text: |
        سياق محادثة: سياق إنتاج عام — اعمال الكونتر الوحدات الخلفيه.
        الهدف تحويل العبارة إلى تذكرة واضحة للفريق المختص. (سياق إنتاج عام #003)
        اجمع الكمية، الخامة الحالية، المقاس، وأي اشتراطات اعتماد. (سياق إنتاج عام #003)
        قرار البوت: فتح مسار معاينة أو مقايسة، لا سعر نهائي من المحادثة. (سياق إنتاج عام #003)
        ملاحظة جودة: يحفظ البند كلغة إنتاج لا كجملة عامة. (سياق إنتاج عام #003)
        يُستخدم هذا السياق لتقليل أخطاء التصنيف داخل المحادثة. (سياق إنتاج عام #003)

