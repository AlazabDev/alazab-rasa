      هذا النص يؤسس لرد مهني مختصر يفتح مسار الطلب بدلاً من الدخول في شرح زائد.
      اجمع بيانات الفرع، نقطة العطل، آخر تدخل تم على نفس البند، وما إن كانت هناك خامات متوفرة بالموقع.
      المقايسة النهائية تعتمد على الكمية، الحالة، الخامات، موقع التنفيذ، واشتراطات الإدارة.
      تُحفظ صياغة الطلب بشكل يصلح للعمليات: بند، مكان، كمية، أولوية، مرفقات، خطوة تالية.
      في الأبواب والزجاج، يتم تحديد نوع الباب، اتجاه الحركة، حالة المفصلات أو ماكينة الغلق، ووجود خطر على المستخدمين.
