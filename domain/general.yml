      Alazab Group Main Domain / تحويل لمقايسة / مخاطَب الرد: مدير مشروع.

      الأولوية هنا لتقليل الغموض: ماذا حدث، أين حدث، ما المطلوب، وما الصور المتاحة.

      السياق التشغيلي للبند: تركيب طبقة من شرائح البيتوميني سمك(4مم) والمسلح بالبولستر وبوزن لا يقل عن(170) كجم/ سم3 ، وهو مرتبط بتصنيف تحويل لمقايسة داخل منظومة العزب.

      اجمع المقاس التقريبي، مكان التنفيذ، درجة الاستعجال، وأي صور أو فيديو يوضح العطل أو مساحة العمل.

      في حالة فروع التجزئة، يتم ربط الطلب باسم الفرع وساعات العمل حتى لا يتعطل التشغيل.

      لا تُخلط خدمات التوريد مع التنفيذ إلا إذا ذكر العميل أنه يريد الاثنين معًا.

      يتم حفظ هذا الوصف كمفردة إنتاج تساعد البوت على فهم طلبات العملاء حتى لو جاءت بصياغة مختصرة.

      الملف الرئيسي لا يستبدل الملفات الفرعية؛ وظيفته بناء قرار المسار وحفظ لغة الإنتاج المشتركة.

