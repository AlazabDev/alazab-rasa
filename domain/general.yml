      مثال: تغيير 5 كشافات في فرع معين، عطل سباكة، صيانة تكييف، أو أي بند مطلوب.

      هذا رد رئيسي محفوظ في الدومين الأساسي ويُستخدم للتوجيه العام قبل الدخول في الملفات الفرعية.

