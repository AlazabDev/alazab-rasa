      الجودة هنا تعني خامة مناسبة، تركيب صحيح، تشطيب نظيف، ومراجعة نهائية قبل التسليم.
      يجب أن يكون رد البوت حاسمًا: سنسجل الطلب، نراجع الصور، ثم نحدد المطلوب فنيًا.
      يتم حفظ هذا الوصف كمفردة إنتاج تساعد البوت على فهم طلبات العملاء حتى لو جاءت بصياغة مختصرة.
      أي طلب يحتوي خطورة تشغيل أو سلامة أو توقف فرع يتم رفعه قبل الطلبات العادية.
  utter_main_production_context_012:
  - text: |-
      Alazab Group Main Domain يعالج هذا البند تحت مسار قرار مسار الخدمة.
