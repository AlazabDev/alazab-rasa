responses:
  utter_alazab_master_welcome:
  - text: |-
      👋 أهلاً بك في مساعد مجموعة العزب الذكي.
      أنا هنا لتوجيهك بسرعة بين خدمات: المقاولات، تجهيز الفروع، التشطيب الراقي، الصيانة، والتوريدات.

      اختر المسار المناسب:
      1️⃣ Alazab Construction — مقاولات وإدارة تنفيذ
      2️⃣ Brand Identity — تجهيز فروع وهوية تجارية
      3️⃣ Luxury Finishing — تشطيب راقٍ
      4️⃣ UberFix — صيانة وتشغيل
      5️⃣ Laban Alasfour — توريدات وخامات

      اكتب الخدمة المطلوبة، وسأحوّل طلبك للمسار الصحيح.
  utter_abo_auf_branch_coffee_mode:
  - text: |-
      ☕ أهلاً يا مدير الفرع… أبو عوف حاضر معاك.
      واضح إن اليوم محتاج قهوة محترمة قبل ما نفتح البلاغات.

      تحب نبدأ بإيه؟
      1️⃣ فتح بلاغ صيانة
      2️⃣ متابعة بلاغ سابق
      3️⃣ نكتة قهوة خفيفة وبعدها نرجع للشغل

      الضحك جميل… لكن البلاغ المتأخر يبوّظ اليوم كله 😄
  utter_maintenance_fast_start:
  - text: |-
      تمام يا مدير.
      خلينا نسجل الطلب صح من أول مرة.

      اكتب لي بالترتيب:
      • اسم الفرع
      • نوع العطل أو البند
      • درجة الخطورة: عادي / مهم / عاجل
      • صورة أو فيديو إن وجد

      بعدها أجهز الطلب لمسار الصيانة المناسب.
  utter_route_to_human_with_summary:
  - text: |-
      تم استلام طلبك.
      لو الموضوع يحتاج تدخل بشري، سأجهز ملخصًا واضحًا للفريق يشمل: الخدمة، الموقع، درجة الأولوية، والتفاصيل الأساسية.

      اكتب آخر تفصيلة ناقصة وسأكمل التحويل.
  utter_bot_challenge:
  - text: |-
      أنا عزبوت 🤖، المساعد الذكي لمجموعة العزب!
      أنا هنا عشان أسهل عليك الوصول لكل خدماتنا، سواء كنت محتاج مقاولات، تشطيب، صيانة، أو حتى توريد خامات.
      تحب نبدأ بإيه؟ 😊
  utter_ask_help:
  - text: |-
      أنا تحت أمرك! 📚 دي الحاجات اللي أقدر أساعدك فيها:
      🏗️ **المقاولات**: "عايز ابني عمارة" أو "تأسيس مشروع".
      ✨ **التشطيب**: "أسعار التشطيب" أو "معاينة شقة".
      🎨 **الهوية**: "تصميم براند" أو "تجهيز محل".
      🔧 **الصيانة**: "طلب صيانة أوبرفيكس" للأعطال.
      📦 **التوريدات**: "خامات بناء" أو "طلب جملة".
      قولي محتاج إيه وأنا معاك! 💪
  utter_out_of_scope:
  - text: |-
      للأسف، النقطة دي بره تخصصي شوية 😅
      أنا شاطر جداً في كل ما يخص خدمات **مجموعة العزب** (مقاولات، تشطيب، صيانة، توريدات).
      تحب أساعدك في أي حاجة تانية تخص تخصصنا؟ 😊
  utter_session_start:
  - text: |-
      👋 مرحباً! أنا AzaBot، مساعدك الذكي من مجموعة العزب.
      كيف يمكنني خدمتك اليوم؟
      قبل ذلك، ما هو سبب رغبتك في التحدث مع ممثل؟
      هل تريد الانتظار أو التحدث مع ممثل الآن؟
      برجاء الانتظار لحظة...
      رقمك في الطابور: {queue_position}
      سيصلك ممثل قريباً، برجاء الانتظار.
      سيتولى خدمتك الآن. شكراً لصبرك.
      أوقات عملنا: السبت–الخميس 9ص–10م
      +201000000000
      فريقنا سيرد عليك في أقرب وقت.
      هل يمكنني مساعدتك في شيء آخر؟
      من فضلك أخبرني بتفاصيل المشكلة.
      سيتواصل معك خلال 24 ساعة عمل.
      لتحويل بياناتك لفريق المبيعات، أحتاج بعض المعلومات.
      الاسم: {user_name}
      الهاتف: {user_phone}
      الموقع: {location}
      الخدمة: {service_type}
      سيتواصل معك أحد مهندسينا خلال 24 ساعة عمل.
      شكراً لاهتمامك بمجموعة العزب.
      1️⃣ تقييم الخدمة (1–5 نجوم)
      2️⃣ اقتراح تطوير
      3️⃣ مشاركة تجربتك
      1⭐ سيء جداً
      2⭐ سيء
      3⭐ متوسط
      4⭐ جيد
      5⭐ ممتاز
      💰 "كم سعر التشطيب للمتر؟"
      ⏰ "كام المدة الزمنية للبناء؟"
      🔒 "عندكم ضمان على الشغل؟"
      📍 "بتشتغلوا في أي محافظات؟"
      💳 "ايه طرق الدفع المتاحة؟"
      {results}
      حاول كلمة أخرى أو اختر من القائمة.
