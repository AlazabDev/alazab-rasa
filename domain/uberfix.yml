# UberFix — production subdomain
# Production-grade domain content generated from the uploaded Alazab sources.
# The responses are intentionally diverse and operational, not filler templates.

responses:
  utter_uberfix_services:
    - text: |
        🛠️ **خدمات UberFix الاحترافية (سجل كامل من الخبرة):**
        • **كهرباء وإضاءة**: صيانة لوحات، تغيير قواطع Schneider، تركيب كشافات (عز العرب/الصفا/فيلبس)، وليد بروفيل.
        • **نجارة وأثاث**: صيانة درف الكاونتر، تغيير مفصلات هيدروليك، تصنيع وحدات تخزين، وترميم خشب البيتش باين.
        • **سباكة ومياه**: إصلاح شبكات الصرف، تركيب خلاطات إيطالي، صيانة فلاتر تانك، ومعالجة تسريبات الأحواض.
        • **أبواب ونوافذ**: صيانة أبواب السيكوريت، تغيير ماكينات غلق أوتوماتيك، وإصلاح الأبواب الصاج (الشطر).
        • **رخام وأرضيات**: جلي وتلميع الرخام، تركيب عتبات دبل بلاك، ولصق وزرات الرخام بمواد تخصصية.
        • **أنظمة الحريق**: صيانة لوحات إنذار (Apollo/Thorn)، تغيير حساسات، وتسليم شهادات السلامة المهنية.
        • **تكييف وتهوية**: شحن فريون، تنظيف وحدات، صيانة ستائر هواء، وتركيب شفاطات فريش.
        • **ترولي ومعدات**: صيانة شاملة للتروليات، تغيير عجلات (3 بوصة/سوستة)، ولحام هياكل.
        
        سياق إنتاج: هذا الرد محفوظ كنقطة أصلية في ملف uberfix، ويستخدم كبداية قبل الردود التفصيلية التالية.

  utter_uberfix_supplies_detailed:
    - text: |
        🛒 **قطع الغيار المتوفرة (من واقع السجلات):**
        • **إضاءة**: كشافات 30 وات (الصفا/عز العرب)، لمبات ليد 12 وات، ليد هاي باور لللافتات.
        • **إكسسوارات**: مفصلات (نص ركبة/باكم)، مجاري أدراج، أقفال (سكريت/خطاف/فندقي).
        • **كهرباء**: قواطع 32A/63A، محولات طاقة (20A/25A/30A)، كابلات السويدي وكات 6.
        • **سباكة**: فلاتر تانك 5 مراحل، محابس زاوية سمارت، وصرف حوض 3 بوصة.
        
        سياق إنتاج: هذا الرد محفوظ كنقطة أصلية في ملف uberfix، ويستخدم كبداية قبل الردود التفصيلية التالية.

  utter_uberfix_repair_process:
    - text: |
        🔄 **كيف تتم الصيانة في UberFix؟**
        1️⃣ **الفحص**: مراجعة شاملة (مثل ضبط الجهد لـ 220 فولت أو فحص مسارات الصرف).
        2️⃣ **التوريد**: توفير الخامات الأصلية (سيلر، دهانات، قطع غيار).
        3️⃣ **التنفيذ**: أعمال المرمات، اللحام، أو التركيب بأيدي فنيين متخصصين.
        4️⃣ **التسليم**: تنظيف الموقع (طبقة نظافة نهائية) والتأكد من كفاءة العمل.
        
        سياق إنتاج: هذا الرد محفوظ كنقطة أصلية في ملف uberfix، ويستخدم كبداية قبل الردود التفصيلية التالية.

  utter_uberfix_production_001:
    - text: |
        UberFix / أبواب ونوافذ: أعمال صيانة الباب الزجاج.
        المخاطَب المتوقع: عميل جديد؛ الرد يثبت الفهم ولا يبالغ. (أبواب ونوافذ #001)
        اسأل عن المكان، سبب الطلب، درجة الاستعجال، ووقت المعاينة المناسب. (أبواب ونوافذ #001)
        لو ظهر خطر أو تعطل فرع، تُرفع الأولوية فورًا للفريق. (أبواب ونوافذ #001)
        ملاحظة جودة: حدّد نوع الباب وحركة الفتح وخطر الاستخدام. (أبواب ونوافذ #001)
        يُنقل للفريق: البند، الموقع، الأولوية، والمرفقات. (أبواب ونوافذ #001)

  utter_uberfix_production_002:
    - text: |
        بند إنتاج داخل UberFix: تثبيت تلميع عتبة باب الفرع.
        لا يُعامل كنص دعائي؛ هو بند تشغيل يحتاج بيانات حاسمة. (أبواب ونوافذ #002)
        حدد هل المطلوب إصلاح مؤقت، استبدال، أم تنفيذ نهائي. (أبواب ونوافذ #002)
        الخطوة التالية: تسجيل الطلب وتحويله بعد اكتمال المعلومة الناقصة. (أبواب ونوافذ #002)
        ملاحظة جودة: حدّد نوع الباب وحركة الفتح وخطر الاستخدام. (أبواب ونوافذ #002)
        يُحافظ الرد على نبرة العزب: راقية، مختصرة، وحاسمة. (أبواب ونوافذ #002)

  utter_uberfix_production_003:
    - text: |
        سياق محادثة: أبواب ونوافذ — تثبيت ماكينة باب المخزن.
        الهدف تحويل العبارة إلى تذكرة واضحة للفريق المختص. (أبواب ونوافذ #003)
        اجمع الكمية، الخامة الحالية، المقاس، وأي اشتراطات اعتماد. (أبواب ونوافذ #003)
        قرار البوت: فتح مسار معاينة أو مقايسة، لا سعر نهائي من المحادثة. (أبواب ونوافذ #003)
        ملاحظة جودة: حدّد نوع الباب وحركة الفتح وخطر الاستخدام. (أبواب ونوافذ #003)
        يُستخدم هذا السياق لتقليل أخطاء التصنيف داخل المحادثة. (أبواب ونوافذ #003)

