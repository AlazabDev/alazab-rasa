version: "3.1"

# ==================== UberFix Maintenance (Detailed from uberfix.txt) ====================
responses:
  utter_uberfix_services:
    - text: |
        🛠️ **خدمات UberFix الاحترافية (سجل كامل من الخبرة):**
        • **كهرباء وإضاءة**: صيانة لوحات، تغيير قواطع Schneider، تركيب كشافات (عز العرب/الصفا/فيلبس)، وليد بروفيل.
        • **نجارة وأثاث**: صيانة درف الكاونتر، تغيير مفصلات هيدروليك، تصنيع وحدات تخزين، وترميم خشب البيتش باين.
        • **سباكة ومياه**: إصلاح شبكات الصرف، تركيب خلاطات إيطالي، صيانة فلاتر تانك، ومعالجة تسريبات الأحواض.
        • **أبواب ونوافذ**: صيانة أبواب السيكوريت، تغيير ماكينات غلق أوتوماتيك، وإصلاح الأبواب الصاج (الشطر).
        • **رخام وأرضيات**: جلي وتلميع الرخام، تركيب عتبات دبل بلاك، ولصق وزرات الرخام بمواد تخصصية.
        • **أنظمة الحريق**: صيانة لوحات إنذار (Apollo/Thorn)، تغيير حساسات، وتسليم شهادات السلامة المهنية.
        • **تكييف وتهوية**: شحن فريون، تنظيف وحدات، صيانة ستائر هواء، وتركيب شفاطات فريش.
        • **ترولي ومعدات**: صيانة شاملة للتروليات، تغيير عجلات (3 بوصة/سوستة)، ولحام هياكل.

  utter_uberfix_supplies_detailed:
    - text: |
        🛒 **قطع الغيار المتوفرة (من واقع السجلات):**
        • **إضاءة**: كشافات 30 وات (الصفا/عز العرب)، لمبات ليد 12 وات، ليد هاي باور لللافتات.
        • **إكسسوارات**: مفصلات (نص ركبة/باكم)، مجاري أدراج، أقفال (سكريت/خطاف/فندقي).
        • **كهرباء**: قواطع 32A/63A، محولات طاقة (20A/25A/30A)، كابلات السويدي وكات 6.
        • **سباكة**: فلاتر تانك 5 مراحل، محابس زاوية سمارت، وصرف حوض 3 بوصة.

  utter_uberfix_repair_process:
    - text: |
        🔄 **كيف تتم الصيانة في UberFix؟**
        1️⃣ **الفحص**: مراجعة شاملة (مثل ضبط الجهد لـ 220 فولت أو فحص مسارات الصرف).
        2️⃣ **التوريد**: توفير الخامات الأصلية (سيلر، دهانات، قطع غيار).
        3️⃣ **التنفيذ**: أعمال المرمات، اللحام، أو التركيب بأيدي فنيين متخصصين.
        4️⃣ **التسليم**: تنظيف الموقع (طبقة نظافة نهائية) والتأكد من كفاءة العمل.

