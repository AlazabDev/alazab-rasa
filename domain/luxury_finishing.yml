  utter_luxury_production_001:
    - text: |
        Luxury Finishing / أعمال المباني: تقاس أعمال المباني قياساً هندسياً مع خصم جميع الفتحات من أبواب وشبابيك ومكيفات ومراوح شفط وخلافه .
        المخاطَب المتوقع: عميل جديد؛ الرد يثبت الفهم ولا يبالغ. (أعمال المباني #001)
        اسأل عن المكان، سبب الطلب، درجة الاستعجال، ووقت المعاينة المناسب. (أعمال المباني #001)
        لو ظهر خطر أو تعطل فرع، تُرفع الأولوية فورًا للفريق. (أعمال المباني #001)
        ملاحظة جودة: حدّد نوع الباب وحركة الفتح وخطر الاستخدام. (أعمال المباني #001)
        يُنقل للفريق: البند، الموقع، الأولوية، والمرفقات. (أعمال المباني #001)

  utter_luxury_production_002:
    - text: |
        بند إنتاج داخل Luxury Finishing: الشبك المعدني الممدد المجلفن عرض( 5سم) على شكل نتوءات تركب عند إلتقاء المباني بالأعمدة والكمرات ولتغطية المواسير وشبك بزاوية قائمة مدببة وبعرض( 5سم) للطرفين عند الأركان وللأماكن التي لا يتم تركيب حلق لها .
        لا يُعامل كنص دعائي؛ هو بند تشغيل يحتاج بيانات حاسمة. (أعمال المباني #002)
        حدد هل المطلوب إصلاح مؤقت، استبدال، أم تنفيذ نهائي. (أعمال المباني #002)
        الخطوة التالية: تسجيل الطلب وتحويله بعد اكتمال المعلومة الناقصة. (أعمال المباني #002)
        ملاحظة جودة: المقاس والتحميل والتثبيت تحسم اعتماد الوحدة. (أعمال المباني #002)
        يُحافظ الرد على نبرة العزب: راقية، مختصرة، وحاسمة. (أعمال المباني #002)

  utter_luxury_production_003:
    - text: |
        سياق محادثة: البياض واللياسة — تنظيف الأرضيات المجاورة للأماكن المطلوب بياضها مع عمل وقاية لحماية تلك الأرضيات من أعمال البياض.
        الهدف تحويل العبارة إلى تذكرة واضحة للفريق المختص. (البياض واللياسة #003)
        اجمع الكمية، الخامة الحالية، المقاس، وأي اشتراطات اعتماد. (البياض واللياسة #003)
        قرار البوت: فتح مسار معاينة أو مقايسة، لا سعر نهائي من المحادثة. (البياض واللياسة #003)
        ملاحظة جودة: يحفظ البند كلغة إنتاج لا كجملة عامة. (البياض واللياسة #003)
        يُستخدم هذا السياق لتقليل أخطاء التصنيف داخل المحادثة. (البياض واللياسة #003)

  utter_luxury_production_004:
