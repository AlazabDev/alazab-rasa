version: '3.1'
responses:
  utter_luxury_services:
  - text: |
      ✨ **Luxury Finishing** متخصصة في:

      • تشطيبات الوحدات السكنية الراقية

      • التصميم الداخلي الفاخر

      • الإشراف الدقيق على التنفيذ

      • أرضيات: رخام إيطالي، بورسلان فاخر

      • حوائط: دهانات Jotun، ورق حائط إيطالي

      • ديلوكس: من 2500 ج/م²

      • سوبر لوكس: من 4500 ج/م²

  utter_luxury_production_002:
  - text: |
      بند إنتاج داخل Luxury Finishing: الشبك المعدني الممدد المجلفن عرض( 5سم) على شكل نتوءات تركب عند إلتقاء المباني بالأعمدة والكمرات ولتغطية المواسير وشبك بزاوية قائمة مدببة وبعرض( 5سم) للطرفين عند الأركان وللأماكن التي لا يتم تركيب حلق لها .

  utter_luxury_production_003:
  - text: |
      سياق محادثة: البياض واللياسة — تنظيف الأرضيات المجاورة للأماكن المطلوب بياضها مع عمل وقاية لحماية تلك الأرضيات من أعمال البياض.

  utter_luxury_production_004:
  - text: |
      طلب قابل للتشغيل: تقاس أعمال البياض هندسيا مع خصم مسطحات الفتحات كالأبواب والشبابيك والمكيفات ومراوح الشفط وغيرها ومسطحات البياض الواقعة أسفل وبجانب التباليط التي أعلى السقف المستعار ان وجدت مع احتساب جوانب الفتحات.

  utter_luxury_production_005:
  - text: |
      مرجع رد للعميل: لياسة للواجهات الخارجية والعمل يتم حسب تعليمات المهندس المشرف.

  utter_luxury_production_006:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن البياض واللياسة.

  utter_luxury_production_007:
  - text: |
      Luxury Finishing / الأرضيات والرخام: 5- أعمال التباليط والأرضيات والتكسية :-.

  utter_luxury_production_008:
  - text: |
      بند إنتاج داخل Luxury Finishing: المواد اللاصقة لبلاط القيشاني من ( السيربو ) والفنيل بمواد جيدة معتمدة من المهندس المشرف .

  utter_luxury_production_009:
  - text: |
      سياق محادثة: الأرضيات والرخام — تركيب وزرة رخام أو جرانيت مشطوفة بسمك(1سم) وبارتفاع(10 سم) لأرضيات بلاط الموزايكو والرخام ووزرة سيراميك لأرضيات البلاط السيراميك ومن نفس نوع البلاط.

  utter_luxury_production_010:
  - text: |
      طلب قابل للتشغيل: استخدام الصلبان البلاستيكية لأعمال البلاط والبورسلان والقيشاني .

  utter_luxury_production_011:
  - text: |
      مرجع رد للعميل: شطف حواف بلاط التكسية عند الأركان .

  utter_luxury_production_012:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأرضيات والرخام.

  utter_luxury_production_013:
  - text: |
      Luxury Finishing / البياض واللياسة: يحمل على بلاط القيشاني عمل اللياسة المستجدة أسفل البلاط المراد تركيبه .

  utter_luxury_production_014:
  - text: |
      بند إنتاج داخل Luxury Finishing: بالنسبة للكسوة الجدران بالرخام فيتم التركيب ميكانيكيا وعلى أن يتم التركيب بواسطة كانات ومسامير من استنالستيل الذي لا يصدأ ويحمل على هذا البند كافة الاكسسورات والمواد اللازمة لإنهاء العمل على الوجه لأكمل وأن تعتمد جميع مواد التركيب من المهندس المشرف.

  utter_luxury_production_015:
  - text: |
      سياق محادثة: الأرضيات والرخام — بلاطات سيراميك (بورسالين) ايطالي من أجود الأنواع مقاس (80×80×0.98) سم أو بمقاسات مختلفة وذلك لزوم أرضيات الاستقبال وقاعه الطعام والطرقات وحسب المخططات وتعليمات المهندس المشرف.

  utter_luxury_production_016:
  - text: |
      طلب قابل للتشغيل: بلاط سيراميك من أجود الأنواع مقاس (20×20×0.90) سم أو بمقاسات مختلفة وذلك لزوم أرضيات دورات المياه والبوفيه وحسب المخططات وتعليمات المهندس المشرف.

  utter_luxury_production_017:
  - text: |
      مرجع رد للعميل: بلاط سيراميك من أجود الأنواع مقاس (20×30×0.80) سم أو بمقاسات مختلفة وذلك لزوم جدران دورات المياه والمغاسل والبوفيه وحسب المخططات وتعليمات المهندس المشرف والعمل يشمل غراء اللصق الخاص بالبلاط .

  utter_luxury_production_018:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأعمال الصحية والسباكة.

  utter_luxury_production_019:
  - text: |
      Luxury Finishing / الأرضيات والرخام: توريد وتركيب رخام ايطالي للدرج الداخلية والخارجية بسماكة 3 سم للدرجات النائمة بحيث تكون مدموجة من الأعلى بمقدار 1 سم وسماكة 2 سم للدرجات القائمة محمل عليها مانع انزلاق من الكوتشوك والعمل يشمل وزرة من نفس النوع بارتفاع 10 سم.

  utter_luxury_production_020:
  - text: |
      بند إنتاج داخل Luxury Finishing: توريد وتركيب ترابيع رخام ايطالي لزوم استراحات الدرج وبئر الدرج بسماكة 3 سم بحيث تكون مدموجة من الأعلى بمقدار 1 سم والعمل يشمل وزرة من نفس النوع بارتفاع 10 سم.

  utter_luxury_production_021:
  - text: |
      سياق محادثة: الدهانات والترميمات — 6- أعمال الدهانات :-.

  utter_luxury_production_022:
  - text: |
      طلب قابل للتشغيل: أعمال الدهانات تشمل :-.

  utter_luxury_production_023:
  - text: |
      مرجع رد للعميل: تنظيف الجدران بالماء لإزالة أثر مزيل الدهان وتركها تجف .

  utter_luxury_production_024:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الدهانات والترميمات.

  utter_luxury_production_025:
  - text: |
      Luxury Finishing / الدهانات والترميمات: ملئ وتسوية جميع الفراغات والشروخ والتنميلات بمعجون للشقوق العميقة من الصناعات الوطنية ثم صنفرتها ودهانها بنفس الأساس ( للأماكن الممعجنة فقط ) .

  utter_luxury_production_026:
  - text: |
      بند إنتاج داخل Luxury Finishing: تتم أعمال الدهان في جو خال من الغبار وعلى أسطح نظيفة من العوالق والرطوبة .

  utter_luxury_production_027:
  - text: |
      سياق محادثة: الدهانات والترميمات — جميع الشقوق الخشبية تنعم بورق الزجاج قبل الدهان .

  utter_luxury_production_028:
  - text: |
      طلب قابل للتشغيل: تزال جميع النتؤات الظاهرة بالحديد من جراء اللحام ويزال الصدأ بواسطة الفرشاة الحديدية قبل الدهان.

  utter_luxury_production_029:
  - text: |
      مرجع رد للعميل: جميع دهانات الأسقف ان وجدت تكون رشة محببة بلاستيكية تعتمد عينة عليها .

  utter_luxury_production_030:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الدهانات والترميمات.

  utter_luxury_production_031:
  - text: |
      Luxury Finishing / الدهانات والترميمات: دهان للجدران الخارجية من أجود الأنواع ، وذلك لزوم الواجهات الخارجية ، ويعتمد اللون مسبقاً من قبل المهندس المشرف.

  utter_luxury_production_032:
  - text: |
      بند إنتاج داخل Luxury Finishing: دهان للحوائط الداخلية من أجود الأنواع للغرف والعمل يشمل :.

  utter_luxury_production_033:
  - text: |
      سياق محادثة: الدهانات والترميمات — دهان بالرول وجهين نصف كيماوي ونصف لمعة وتكوين اكريليكي مقاوم لعوامل التعرية وقابل للغسيل والتنظيف.

  utter_luxury_production_034:
  - text: |
      طلب قابل للتشغيل: توريد وتركيب واجهات من (G.R.C) من أجود الأنواع ، وذلك لزوم ديكورات الواجهات الخارجية طبقا لما هو موضح بالمخططات، ويعتمد اللون مسبقاً من قبل المهندس المشرف .

  utter_luxury_production_035:
  - text: |
      مرجع رد للعميل: توريد وتركيب مدخل من ال (G.R.C ) علي هيئه كتاب مقلوب طبقا للمخطط المرفق وطبقا لتعليمات المهندس المشرف.

  utter_luxury_production_036:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن العزل ومعالجة الرطوبة.

  utter_luxury_production_037:
  - text: |
      Luxury Finishing / الأرضيات والرخام: طبقة عازلة أفقية لزوم عزل أرضيات دورات المياه والمغاسل والعمل يشمل :-.

  utter_luxury_production_038:
  - text: |
      بند إنتاج داخل Luxury Finishing: دهان بطبقة أساس إسفلتي فوق ظهر البياض .

  utter_luxury_production_039:
  - text: |
      سياق محادثة: العزل ومعالجة الرطوبة — بعد انتهاء تركيب نظام العزل المطلوب يتم تجربة العزل بالغمر بالماء وفي حضور المهندس المشرف.

  utter_luxury_production_040:
  - text: |
      طلب قابل للتشغيل: على المقاول تقديم رسومات تنفيذية للاعمال المعدنية واعمال الحديد المشغول للمهندس المشرف لاعتمادها قبل التوريد والتنفيذ .

  utter_luxury_production_041:
  - text: |
      مرجع رد للعميل: دهان اعمال الحديد المشغول بالمسدس الخاص لمثل تلك الاعمال .

  utter_luxury_production_042:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الدهانات والترميمات.

  utter_luxury_production_043:
  - text: |
      Luxury Finishing / الأعمال الصحية والسباكة: تركيب كالون ومقابض سويتش خاص لأبواب دورات المياه وتكون المقابض من أجود الأنواع وتعتمد من قبل المشرف بتقديم ثلاث عينات لاختيار أنسبها.

  utter_luxury_production_044:
  - text: |
      بند إنتاج داخل Luxury Finishing: يحمل على أعمال الحديد الدهان حسب المواصفات.

  utter_luxury_production_045:
  - text: |
      سياق محادثة: الوحدات الخشبية والتجهيزات — ابواب معدنية ضلفتين مقاس 1.8 * 2.50 م D2 وبنفس مواصفات البند السابق وذلك لزوم المدخل الفرعي وبالاماكن المحدده بالمخطط والتركيب طبقا لتعليمات المهندس المشرف.

  utter_luxury_production_046:
  - text: |
      طلب قابل للتشغيل: ابواب معدنية ضلفه واحده مقاس 1 * 2.20 م D3 وبنفس مواصفات البند السابق وذلك لزوم المدخل الفرعي لمنطقه دور الميزانين فقط وبالاماكن المحدده بالمخطط والتركيب طبقا لتعليمات المهندس المشرف.

  utter_luxury_production_047:
  - text: |
      مرجع رد للعميل: توريد وتركيب ابواب الومنيوم دبل مقاس 0.80 * 2.2 م D6 به فتحه تهويه سفليه مع الحلق ضلفه واحده لزوم دورات المياة والبند يشمل المفصلات والمقابض والكوالين وكافه الاكسسوارات مع اعتماد العينه من قبل المهندس المشرف قبل التوريد.

  utter_luxury_production_048:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الوحدات الخشبية والتجهيزات.

  utter_luxury_production_049:
  - text: |
      Luxury Finishing / البياض واللياسة: أعمال السقف المستعار لا تبدأ إلا بعد الانتهاء من أعمال البياض وتركيب الأرضيات والأبواب والشبابيك .

  utter_luxury_production_050:
  - text: |
      بند إنتاج داخل Luxury Finishing: سقف مستعار من قطاعات وشرائح الالمونيوم سمك ( 0.5 مم) وعرض (10سم) لأسقف البوفيه ودورات المياه وتكون الشرائح مقاومة للرطوبة مع توريد كافه الاكسسوارات الازمه للتثبيت.

  utter_luxury_production_051:
  - text: |
      سياق محادثة: أعمال المباني — اسقف مستعاره جبسيه (60*60*1.2 سم) من عينه معتمده لأسقف غرف المكاتب والطرقات والاستقبال حسب المخطط وبمواصفات الشركه المصنعه وفي المنسوب المحدد لها اسفل التمديدات وتكون الشرائح مقاومة للرطوبة مع تركيب كافه الاكسسوارات الازمه .

  utter_luxury_production_052:
  - text: |
      طلب قابل للتشغيل: 10- أعمال : النجارة والاعمال الزجاجيه واعمال الواجهات :-.

  utter_luxury_production_053:
  - text: |
      مرجع رد للعميل: الدهان بالمسدس للأبواب والحلوق الخشبية حسب مواصفات وجه أساس مناسب للاخشاب.

  utter_luxury_production_054:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأبواب والواجهات.

  utter_luxury_production_055:
  - text: |
      Luxury Finishing / الدهانات والترميمات: دهان معجون خاص بالخشب مع الصنفرة بورق الصنفرة رقم(1) للوجه الأول ورقم(0) للوجه الأخر. وجه أساس أخر ثم وجهين نصف كيماوي باللون المطلوب.

  utter_luxury_production_056:
  - text: |
      بند إنتاج داخل Luxury Finishing: باب خشب ضلفه واحده وبنفس مواصفات البند السابق مقاس 0.7 * 2.2 م D10 لزوم المستودع اسفل الدرج والتركيب طبقا للمخطط وتعليمات المهندس المشرف.

  utter_luxury_production_057:
  - text: |
      سياق محادثة: الأبواب والواجهات — باب خشب ضلفه واحده وبنفس مواصفات البند السابق مقاس 0.90 * 2.20 م D5 لزوم الغرف والمكاتب والتركيب طبقا للمخطط وتعليمات المهندس المشرف.

  utter_luxury_production_058:
  - text: |
      طلب قابل للتشغيل: باب خشب ضلفتين وبنفس مواصفات البند السابق مقاس 1.5 * 2.20 م D7 لزوم مداخل المكاتب والتركيب طبقا للمخطط وتعليمات المهندس المشرف.

  utter_luxury_production_059:
  - text: |
      مرجع رد للعميل: باب خشب ضلفتين وبنفس مواصفات البند السابق مقاس 1.4 * 2.20 م D9 لزوم الغرف والمكاتب والتركيب طبقا للمخطط وتعليمات المهندس المشرف.

  utter_luxury_production_060:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأبواب والواجهات.

  utter_luxury_production_061:
  - text: |
      Luxury Finishing / الأعمال الصحية والسباكة: تكون المواسير اليلاستيك من نوع مادةCPVC منتجاً وطنياً (Flow Guard S.C.H.80) لمواسير المياه الساخنة ومن نوع UPVC درجة خامسة حسب المواصفات السعودية لمواسير المياه الباردة وتكون قطع الوصلات.

  utter_luxury_production_062:
  - text: |
      بند إنتاج داخل Luxury Finishing: مواسير الصرف من البلاستيك السميك( U.P.V.C) منتجا وطنيا وقطع الوصلات درجة رابعة للمواسير الداخلية ومواسير الصرف الصحي بين غرف التفتيش ودرجة خامسة للمواسير الظاهرية الرأسية ويتم دهان المواسير 0.

  utter_luxury_production_063:
  - text: |
      سياق محادثة: الأعمال الصحية والسباكة — يحمل على البنود مواسير الصرف و التهوية داخل الدورات حتى الأعمدة الرئيسية بالنسبة للأدوار العليا وإلى أقرب جاليتراب أو غرفة تفتيش بالنسبة للدور الأرضي .

  utter_luxury_production_064:
  - text: |
      طلب قابل للتشغيل: غرف للمحابس من المباني بالطوب المصمت سمك طوبة وبمقاس مناسب لأعمال صيانة المحابس مع فرشة من الخرسانة سمك(20سم) مع لياسة الغرفة من الداخل وتركيب غطاء زهر من الوزن الثقيل ان استدعى الأمر.

  utter_luxury_production_065:
  - text: |
      مرجع رد للعميل: المواسير البلاستيك تركب باستخدام الجلب المطاطية للصرف ومياه التغذية للأقطار التى تزيد عن (50) مم.

  utter_luxury_production_066:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأعمال الصحية والسباكة.

  utter_luxury_production_067:
  - text: |
      Luxury Finishing / الأبواب والواجهات: سيفون أرضية من البلاستيك UPVC قطر ( 4 بوصة ) مع غطاء من الاستانلس ستيل .ويشمل مواسير الصرف والتهوية حتى الأعمدة الرئيسية .

  utter_luxury_production_068:
  - text: |
      بند إنتاج داخل Luxury Finishing: تركيب شطاف بلى مع خلاط قطعة واحدة حار وبارد.

  utter_luxury_production_069:
  - text: |
      سياق محادثة: الأرضيات والرخام — حوض غسيل أيدي من أجود الأنواع ( يركب على بلاطة رخامية ) والعمل يشمل :-.

  utter_luxury_production_070:
  - text: |
      طلب قابل للتشغيل: تركيب هرابات للصرف أسفل المغاسل.

  utter_luxury_production_071:
  - text: |
      مرجع رد للعميل: عمل زوايا حديدية بطول المغاسل يثبت بالجدران من الجهتين وتكون المسافة الرأسية بينهما(60سم) يثبت بها شبك مجلفن مع اللياسة ليتم تركيب بلاط بورسلان عليها من جهة الدورات ويراعى دهان الزوايا الحديدية بوجهين أساس.

  utter_luxury_production_072:
  - text: |
      Luxury Finishing يقرأ هذا الطلب ضمن الأعمال الصحية والسباكة.

  utter_luxury_production_073:
  - text: |
      Luxury Finishing / الوحدات الخشبية والتجهيزات: توريد وتركيب مرآة بسمك (6 مم) بارتفاع (80 سم) وبعرض المغسلة مشطوفة الاطراف تثبت بواسطة مسامير خاصة غير قابلة للصدأ مع غطاء كروم من اجود الانواع وحسب تعليمات المهندس المشرف .

  utter_luxury_production_074:
  - text: |
