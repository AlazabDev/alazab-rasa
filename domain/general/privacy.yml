responses:
  utter_privacy_intro:
    - text: |
        خصوصيتك مهمة لنا في مجموعة العزب. جميع بياناتك تُستخدم فقط لتحسين تجربتك أو تنفيذ الخدمة المطلوبة، ولا يتم مشاركتها مع أي طرف خارجي إلا بموافقتك.
        يمكنك في أي وقت الاستفسار عن سياسة الخصوصية أو طلب حذف بياناتك من النظام.
  utter_privacy_ask_question:
    - text: |
        هل ترغب في معرفة المزيد عن كيفية استخدام البيانات؟ يمكنك أيضًا طلب حذف بياناتك أو الاعتراض على المعالجة.
        إذا أردت اتخاذ إجراء معين (استفسار، حذف، اعتراض)، يرجى توضيحه الآن.