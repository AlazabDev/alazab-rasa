version: "3.1"
actions:
  - "action_human_handoff"
slots:
  confirm_human_handoff:
    type: "categorical"
    mappings:
      - type: "custom"
    values:
      - "Yes"
      - "No"
responses:
  utter_offer_human_handoff:
    - text: "هل ترغب في التحدث مع أحد أفراد فريقنا البشري؟"
    - text: "Would you like to be connected to a human agent?"
      channel: "browser_audio"
  utter_ask_confirm_human_handoff:
    - text: "هل ترغب في التحدث مع أحد أفراد فريقنا البشري؟"
      buttons:
        - payload: "/SetSlots(confirm_human_handoff=Yes)"
          title: "نعم"
        - payload: "/SetSlots(confirm_human_handoff=No)"
          title: "لا"
    - text: "Would you like to be connected to a human agent?"
      channel: "browser_audio"
  utter_transferring_to_human:
    - text: "سيتم تحويلك الآن إلى أحد أفراد فريقنا البشري خلال لحظات."
    - text: "You will be transferred to a human agent in a few moments."
      channel: "browser_audio"
  utter_human_handoff_cancelled:
    - text: "تم إلغاء التحويل. هل ترغب في المساعدة في شيء آخر؟"
      metadata:
        rephrase: True
    - text: "Ok, I understand you don't want to be connected to a human agent. Is there something else I can help you with?"
      channel: "browser_audio"
      metadata:
        rephrase: True
  utter_transfer_to_manager:
    - text: "سيتم إرسال ملخص محادثتنا إلى مدير المتابعة:\n{summary}"
    - text: "I will transfer the following summary of our conversation to the Callback Manager:\n{summary}"
      channel: "browser_audio"
  utter_offer_alternative_contact:
    - text: "عفواً، الفريق غير متاح حالياً. يمكنك التواصل معنا عبر واتساب: +201000000000"
    - text: "I'm sorry, our team is currently unavailable. You can reach us on WhatsApp: +201000000000"
      channel: "browser_audio"
