version: "3.1"

# ==================== Alazab Construction — General & Civil ====================
responses:
  utter_alazab_about:
    - text: |
        🏢 **Alazab Construction — التميز المعماري**
        الكيان الرئيسي لمجموعة العزب، متخصص في الإدارة الهندسية المتكاملة للمشروعات.
        نحن لا نبني جدراناً، نحن نبني استثمارات تدوم للأجيال بالتزام كامل بأصول الصناعة.

  utter_alazab_services:
    - text: |
        🏢 **خدمات Alazab Construction الهندسية:**
        • **الإنشاءات**: بناء العمارات والفلل والمنشآت التجارية.
        • **الإدارة الفنية**: الإشراف الكامل على المواقع والجداول الزمنية.
        • **التجهيزات (Fit-out)**: تشطيبات متكاملة للمباني الإدارية والسكنية.
        • **التطوير العقاري**: إدارة وتطوير المشروعات من الأرض حتى التسليم.

  utter_alazab_technical_specs:
    - text: |
        🏗️ **المواصفات القياسية (أصول الصناعة):**
        نحن نطبق أعلى المعايير الهندسية لضمان جودة "الجوهر":
        • **اللياسة (البياض)**: تنفيذ بطريقة "البقج والأوتار" لضمان استواء الحوائط.
        • **العزل**: عزل بيتومين 4 ملم (PY30E) بضمان 10 سنوات واختبار غمر 24 ساعة.
        • **الأعمال الصحية**: تمديدات CPVC Flow Guard S.C.H.80 ومواسير Smart Home.
        • **التكييف**: أنظمة Package و Concealed طبقاً لمعايير ASHRAE.
        • **الكهرباء**: لوحات MGP رئيسية وقواطع Schneider مع كابلات السويدي الأصلية.

  utter_alazab_projects:
    - text: |
        🏆 **سجل الإنجازات:**
        ✅ تنفيذ **125 فرعاً تجارياً** لسلاسل عالمية وإقليمية.
        ✅ إنشاء عمارات سكنية متكاملة في القاهرة الجديدة والتجمع.
        ✅ إدارة مشروعات الـ Fit-out لمكاتب إدارية بمساحات تتجاوز 5000 م².

  utter_alazab_quote:
    - text: |
        💰 **طلب عرض سعر هندسي:**
        لتقديم عرض سعر دقيق، يرجى تزويدنا بـ:
        • نوع المشروع (سكني/تجاري).
        • المساحة الكلية.
        • هل توجد مقايسة معتمدة أم ترغب في عمل مقايسة جديدة؟

