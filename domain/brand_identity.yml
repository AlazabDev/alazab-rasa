  utter_brand_portfolio:
  - text: |
      أقدر أوضح لك نماذج أعمال الهوية وتجهيز المساحات حسب نوع النشاط.

      اكتب نوع المشروع أو البراند المطلوب تطويره.

      هذا رد رئيسي محفوظ في الدومين الأساسي ويُستخدم للتوجيه العام قبل الدخول في الملفات الفرعية.

  utter_brand_complete_identity:
  - text: |
      الهوية الكاملة تشمل الشعار، الألوان، الخطوط، النمط البصري، التطبيقات، ودليل الاستخدام.

      اكتب نوع النشاط، وأنا أساعدك نحدد احتياجك بدقة.

      هذا رد رئيسي محفوظ في الدومين الأساسي ويُستخدم للتوجيه العام قبل الدخول في الملفات الفرعية.

